<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>양끝 집기</title>
  <link rel="stylesheet" href="../../shared/style.css?v=5">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <h1 class="game-title">🪙 양끝 집기</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">
        <svg id="soundIconIntro" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
    </header>

    <div class="intro-body">
      <!-- 동전 줄 일러스트 -->
      <div class="intro-preview" aria-hidden="true">
        <svg viewBox="0 0 220 80" width="220" height="80">
          <g font-size="20" font-weight="900" text-anchor="middle" fill="#7B5E00">
            <circle cx="26" cy="44" r="22" fill="#FFD54F" stroke="#F9A825" stroke-width="3"/><text x="26" y="51">3</text>
            <circle cx="73" cy="44" r="22" fill="#FFE082" stroke="#F9A825" stroke-width="3"/><text x="73" y="51">8</text>
            <circle cx="120" cy="44" r="22" fill="#FFE082" stroke="#F9A825" stroke-width="3"/><text x="120" y="51">1</text>
            <circle cx="167" cy="44" r="22" fill="#FFD54F" stroke="#F9A825" stroke-width="3"/><text x="167" y="51">6</text>
          </g>
          <text x="26" y="14" text-anchor="middle" font-size="13" font-weight="900" fill="#29B6F6">▲ 끝</text>
          <text x="167" y="14" text-anchor="middle" font-size="13" font-weight="900" fill="#EF5350">끝 ▲</text>
        </svg>
      </div>

      <p class="intro-text">줄의 양쪽 끝에서 동전을 하나씩!</p>
      <div class="intro-rules">
        <div class="rule-item">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#29B6F6" stroke-width="2.5" stroke-linecap="round">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span>번갈아 가며 <b>맨 왼쪽 또는 맨 오른쪽</b> 동전을 가져가요</span>
        </div>
        <div class="rule-item">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#FFA726" stroke-width="2.5" stroke-linecap="round">
            <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>
          </svg>
          <span>지금 큰 걸 집으면 상대에게 더 큰 게 갈 수도!</span>
        </div>
        <div class="rule-item">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#EF5350" stroke-width="2.5" stroke-linecap="round">
            <path d="M12 2l3 6 7 .5-5 4.5 1.5 7L12 17l-6.5 3 1.5-7-5-4.5 7-.5z"/>
          </svg>
          <span>모은 동전 합이 더 큰 사람이 승리!</span>
        </div>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 1-5: 카운트다운 -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">
    <header class="game-header">
      <button class="icon-btn" id="closeBtn" aria-label="홈으로">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <div class="turn-banner" id="turnBanner">
        <div class="turn-dot" id="turnDot"></div>
        <span class="turn-text" id="turnText">P1의 차례</span>
      </div>
      <button class="sound-toggle" id="soundToggleGame" aria-label="사운드 토글">
        <svg id="soundIconGame" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
    </header>

    <!-- 두 플레이어 합계 -->
    <div class="totals-row">
      <div class="total-card p1" id="totalCard0">
        <span class="tc-label">P1</span>
        <span class="tc-val" id="total-0">0</span>
      </div>
      <div class="total-card p2" id="totalCard1">
        <span class="tc-label">P2</span>
        <span class="tc-val" id="total-1">0</span>
      </div>
    </div>

    <p class="hint-text" id="hintText">양쪽 끝(반짝이는 동전)에서 하나를 가져가요</p>

    <!-- 동전 줄 (JS 생성) -->
    <div class="coins-area">
      <div class="coins-row" id="coinsRow"></div>
    </div>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <header class="game-header result-header">
      <div></div>
      <h2 class="result-header-title">게임 종료!</h2>
      <div></div>
    </header>

    <div class="result-body">
      <div class="result-icon-wrap" id="resultIconWrap"></div>
      <h2 class="result-title" id="resultTitle">P1 승리!</h2>
      <p class="result-sub" id="resultSub"></p>
    </div>

    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js?v=12"></script>
  <script src="game.js"></script>

</body>
</html>
