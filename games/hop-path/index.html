<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>징검다리 폴짝</title>
  <link rel="stylesheet" href="../../shared/style.css?v=5">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
      <h1 class="game-title">🐸 징검다리 폴짝</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔊</button>
    </header>
    <div class="intro-body">
      <div class="intro-illustration" aria-hidden="true">
        <svg viewBox="0 0 220 90" width="220" height="90">
          <rect x="4" y="4" width="212" height="82" rx="12" fill="#FFF8E1" stroke="#2C2C2C" stroke-width="3"/>
          <g font-size="16" font-weight="900" text-anchor="middle" fill="#5D4037">
            <rect x="14" y="40" width="30" height="30" rx="8" fill="#B3E5FC" stroke="#2C2C2C" stroke-width="3"/><text x="29" y="61">2</text>
            <rect x="54" y="40" width="30" height="30" rx="8" fill="#FFE0B2" stroke="#2C2C2C" stroke-width="3"/><text x="69" y="61">1</text>
            <rect x="94" y="40" width="30" height="30" rx="8" fill="#C8E6C9" stroke="#2C2C2C" stroke-width="3"/><text x="109" y="61">2</text>
            <rect x="134" y="40" width="30" height="30" rx="8" fill="#FFE0B2" stroke="#2C2C2C" stroke-width="3"/><text x="149" y="61">3</text>
            <rect x="174" y="40" width="30" height="30" rx="8" fill="#F8BBD0" stroke="#2C2C2C" stroke-width="3"/><text x="189" y="62">🏁</text>
          </g>
          <text x="29" y="32" text-anchor="middle" font-size="18">🐸</text>
          <path d="M31 36 Q70 14 107 36" stroke="#43A047" stroke-width="2.5" fill="none" stroke-dasharray="4 3"/>
        </svg>
      </div>
      <p class="intro-text">칸에 적힌 수만큼 폴짝!<br>깃발🏁까지 먼저 가요!</p>
      <p class="intro-subtext">적힌 수만큼 왼쪽·오른쪽으로 점프 · 막히면 ↺처음 · 3라운드 승부</p>
      <div class="select-label">인원 선택</div>
      <div class="player-select-row">
        <button class="player-btn active" data-count="2">2명</button>
        <button class="player-btn" data-count="3">3명</button>
        <button class="player-btn" data-count="4">4명</button>
      </div>
    </div>
    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <section class="screen screen-game" id="gameScreen">
    <div class="top-bar" id="problemPanel">
      <div class="top-bar-meta">
        <div class="question-counter" id="questionCounter">1 / 3</div>
        <div class="problem-timer" id="problemTimer">45</div>
      </div>
      <div class="problem-status" id="problemStatus">시작🟢부터 끝🔴까지 길을 따라가세요!</div>
      <button class="icon-btn close-btn" id="closeBtn" aria-label="홈으로">✕</button>
    </div>
    <div class="zones-wrap" id="zonesWrap"></div>
    <div class="score-bar" id="scoreBar"></div>
  </section>

  <section class="screen screen-result" id="resultScreen">
    <header class="result-header">
      <h2 class="result-title" id="resultTitle">게임 종료!</h2>
    </header>
    <div class="result-winner" id="resultWinner"></div>
    <div class="total-row" id="totalRow"></div>
    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js?v=12"></script>
  <script src="game.js"></script>
</body>
</html>
