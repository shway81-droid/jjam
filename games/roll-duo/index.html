<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>함께 굴려라</title>
  <link rel="stylesheet" href="../../shared/style.css?v=5">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <h1 class="game-title">함께 굴려라</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">
        <svg id="soundIconIntro" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
    </header>

    <div class="intro-body">
      <!-- 일러스트: 작은 미로 + 공 + 골대 -->
      <div class="intro-preview" aria-hidden="true">
        <svg viewBox="0 0 200 120" width="200" height="120">
          <!-- 미로 외곽 -->
          <rect x="8" y="8" width="184" height="104" rx="12" fill="#FFFFFF" stroke="#2C2C2C" stroke-width="3"/>
          <!-- 벽 블록 -->
          <rect x="60" y="14" width="36" height="36" rx="6" fill="#8D6E63" stroke="#2C2C2C" stroke-width="3"/>
          <rect x="104" y="70" width="36" height="36" rx="6" fill="#8D6E63" stroke="#2C2C2C" stroke-width="3"/>
          <!-- 구덩이 -->
          <circle cx="78" cy="88" r="12" fill="#546E7A" stroke="#2C2C2C" stroke-width="3"/>
          <!-- 공 -->
          <circle cx="32" cy="32" r="15" fill="#66BB6A" stroke="#2C2C2C" stroke-width="3"/>
          <text x="32" y="38" text-anchor="middle" font-size="16">⚽</text>
          <!-- 골대 -->
          <circle cx="168" cy="88" r="17" fill="#FFD54F" stroke="#2C2C2C" stroke-width="3"/>
          <text x="168" y="95" text-anchor="middle" font-size="18">🥅</text>
        </svg>
      </div>

      <p class="intro-text">둘이 함께 공을 골대까지!</p>
      <div class="badge-2p">👥 2인 협력</div>

      <div class="intro-rules">
        <div class="rule-item">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#1565C0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="11 17 6 12 11 7"/>
            <polyline points="18 17 13 12 18 7"/>
          </svg>
          <span>P1은 ◀▶ 좌우로 굴려요</span>
        </div>
        <div class="rule-item">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#C62828" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="7 11 12 6 17 11"/>
            <polyline points="7 18 12 13 17 18"/>
          </svg>
          <span>P2는 ▲▼ 위아래로 굴려요</span>
        </div>
        <div class="rule-item">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#546E7A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9"/>
            <line x1="12" y1="8" x2="12" y2="13"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span>구덩이에 빠지면 처음으로!</span>
        </div>
        <div class="rule-item">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#43A047" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          <span>5개의 미로 도전</span>
        </div>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 1-5: 카운트다운 -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">
    <header class="game-header">
      <button class="icon-btn" id="closeBtn" aria-label="홈으로">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>

      <div class="round-banner">
        <span class="round-label">라운드</span>
        <span class="round-num" id="roundNum">1/5</span>
        <span class="round-score" id="roundScore">★ 0</span>
      </div>

      <button class="sound-toggle" id="soundToggleGame" aria-label="사운드 토글">
        <svg id="soundIconGame" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
    </header>

    <!-- 타이머 + 진행 표시 -->
    <div class="target-area">
      <div class="timer-row">
        <div class="timer-wrap">
          <span class="timer-label">남은 시간</span>
          <span class="timer-val" id="timerVal">30</span>
        </div>
        <div class="timer-bar-track">
          <div class="timer-bar-fill" id="timerBar"></div>
        </div>
      </div>
      <div class="banner" id="banner"></div>
    </div>

    <!-- 미로 -->
    <div class="maze-area">
      <div class="maze-grid" id="mazeGrid"></div>
    </div>

    <!-- 양쪽 컨트롤: P1 좌우 / P2 위아래 -->
    <div class="controls">
      <div class="ctrl-block p1">
        <div class="ctrl-label">🧒 P1 좌우</div>
        <div class="ctrl-pad horizontal">
          <button class="dpad-btn" id="btnLeft" type="button" aria-label="왼쪽">◀</button>
          <button class="dpad-btn" id="btnRight" type="button" aria-label="오른쪽">▶</button>
        </div>
      </div>
      <div class="ctrl-block p2">
        <div class="ctrl-label">🧑 P2 위아래</div>
        <div class="ctrl-pad vertical">
          <button class="dpad-btn" id="btnUp" type="button" aria-label="위">▲</button>
          <button class="dpad-btn" id="btnDown" type="button" aria-label="아래">▼</button>
        </div>
      </div>
    </div>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <header class="game-header result-header">
      <div></div>
      <h2 class="result-header-title">협력 종료!</h2>
      <div></div>
    </header>

    <div class="result-body">
      <div class="result-icon-wrap" id="resultIconWrap">
        <svg viewBox="0 0 80 80" width="80" height="80" id="resultIcon">
          <rect x="28" y="62" width="24" height="6" rx="3" fill="#FFA726"/>
          <rect x="22" y="68" width="36" height="6" rx="3" fill="#FFA726"/>
          <path d="M15 18 Q15 50 40 54 Q65 50 65 18 Z" fill="#FFD54F" stroke="#FFA726" stroke-width="2"/>
          <path d="M15 18 Q8 18 8 28 Q8 40 20 42 Q15 35 15 26 Z" fill="#FFA726"/>
          <path d="M65 18 Q72 18 72 28 Q72 40 60 42 Q65 35 65 26 Z" fill="#FFA726"/>
          <ellipse cx="40" cy="20" rx="22" ry="6" fill="#FFE082"/>
          <text x="40" y="42" text-anchor="middle" font-size="16" font-weight="900" fill="#E65100">WIN</text>
        </svg>
      </div>
      <h2 class="result-title" id="resultTitle">5/5</h2>
      <p class="result-sub" id="resultSub">완벽한 협력이에요!</p>
    </div>

    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js?v=12"></script>
  <script src="game.js"></script>

</body>
</html>
