<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>딱 맞게 채우기</title>
  <link rel="stylesheet" href="../../shared/style.css?v=5">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <h1 class="game-title">딱 맞게 채우기</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">
        <svg id="soundIconIntro" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
    </header>

    <div class="intro-body">
      <!-- 일러스트: 통 + 목표 -->
      <div class="intro-preview" aria-hidden="true">
        <svg viewBox="0 0 240 120" width="240" height="120">
          <!-- P1 물방울 (파랑) -->
          <circle cx="34" cy="34" r="20" fill="#B3E5FC" stroke="#2C2C2C" stroke-width="3"/>
          <text x="34" y="41" text-anchor="middle" font-size="18" font-weight="900" fill="#2C2C2C">2·4</text>
          <text x="34" y="14" text-anchor="middle" font-size="9" font-weight="800" fill="#1565C0">P1</text>

          <!-- 통 -->
          <path d="M96 38 L144 38 L138 104 L102 104 Z" fill="#FFFFFF" stroke="#2C2C2C" stroke-width="3"/>
          <path d="M99 78 L141 78 L138 104 L102 104 Z" fill="#A5D6A7" stroke="#2C2C2C" stroke-width="3"/>
          <ellipse cx="120" cy="38" rx="24" ry="6" fill="#FFE082" stroke="#2C2C2C" stroke-width="3"/>

          <!-- P2 물방울 (분홍) -->
          <circle cx="206" cy="34" r="20" fill="#FFCDD2" stroke="#2C2C2C" stroke-width="3"/>
          <text x="206" y="41" text-anchor="middle" font-size="18" font-weight="900" fill="#2C2C2C">3·6</text>
          <text x="206" y="14" text-anchor="middle" font-size="9" font-weight="800" fill="#C62828">P2</text>

          <!-- 목표 표시 -->
          <text x="120" y="120" text-anchor="middle" font-size="13" font-weight="900" fill="#2C2C2C">목표 = 10</text>
        </svg>
      </div>

      <p class="intro-text">통을 목표에 딱 맞게 함께 채워요!</p>
      <div class="badge-2p">👥 2인 협력</div>

      <div class="intro-rules">
        <div class="rule-item">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#43A047" stroke-width="2.5" stroke-linecap="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span>P1·P2 둘 다 아무 때나 눌러 통을 채워요</span>
        </div>
        <div class="rule-item">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#FFA726" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          <span>합이 목표에 딱 맞으면 한 통 완성!</span>
        </div>
        <div class="rule-item">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#EF5350" stroke-width="2.5" stroke-linecap="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
          <span>목표를 넘기면 통이 쏟아져요! 시간 안에 많이!</span>
        </div>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 1-5: 카운트다운 -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">
    <header class="game-header">
      <button class="icon-btn" id="closeBtn" aria-label="홈으로">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>

      <div class="round-banner">
        <span class="round-label">남은시간</span>
        <span class="round-num" id="roundNum">45</span>
        <span class="round-score" id="roundScore">★ 0</span>
      </div>

      <button class="sound-toggle" id="soundToggleGame" aria-label="사운드 토글">
        <svg id="soundIconGame" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
    </header>

    <!-- 목표 + 통(진행) 표시 -->
    <div class="target-area">
      <div class="target-row">
        <div class="bucket" id="bucket">
          <div class="bucket-fill" id="bucketFill"></div>
          <div class="bucket-nums">
            <span class="bucket-cur" id="bucketCur">0</span>
            <span class="bucket-slash">/</span>
            <span class="bucket-goal-val" id="targetVal">10</span>
          </div>
        </div>
      </div>
      <div class="banner" id="banner"></div>
    </div>

    <!-- 양쪽 보드 (둘 다 항상 활성) -->
    <div class="boards">
      <div class="board p1">
        <div class="board-label">🧒 P1</div>
        <div class="card-grid" id="p1Cards"></div>
      </div>
      <div class="board p2">
        <div class="board-label">🧑 P2</div>
        <div class="card-grid" id="p2Cards"></div>
      </div>
    </div>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <header class="game-header result-header">
      <div></div>
      <h2 class="result-header-title">협력 종료!</h2>
      <div></div>
    </header>

    <div class="result-body">
      <div class="result-icon-wrap" id="resultIconWrap">
        <svg viewBox="0 0 80 80" width="80" height="80" id="resultIcon">
          <rect x="28" y="62" width="24" height="6" rx="3" fill="#FFA726"/>
          <rect x="22" y="68" width="36" height="6" rx="3" fill="#FFA726"/>
          <path d="M15 18 Q15 50 40 54 Q65 50 65 18 Z" fill="#FFD54F" stroke="#FFA726" stroke-width="2"/>
          <path d="M15 18 Q8 18 8 28 Q8 40 20 42 Q15 35 15 26 Z" fill="#FFA726"/>
          <path d="M65 18 Q72 18 72 28 Q72 40 60 42 Q65 35 65 26 Z" fill="#FFA726"/>
          <ellipse cx="40" cy="20" rx="22" ry="6" fill="#FFE082"/>
          <text x="40" y="42" text-anchor="middle" font-size="16" font-weight="900" fill="#E65100">WIN</text>
        </svg>
      </div>
      <h2 class="result-title" id="resultTitle">함께 0개 완성!</h2>
      <p class="result-sub" id="resultSub">완벽한 협력이에요!</p>
    </div>

    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js?v=12"></script>
  <script src="game.js"></script>

</body>
</html>
