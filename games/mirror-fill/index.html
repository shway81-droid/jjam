<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>대칭 채우기</title>
  <link rel="stylesheet" href="../../shared/style.css?v=5">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
      <h1 class="game-title">대칭 채우기</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔊</button>
    </header>

    <div class="intro-body">
      <div class="intro-illustration" aria-hidden="true">
        <svg viewBox="0 0 140 110" width="140" height="110">
          <!-- 판 테두리 -->
          <rect x="22" y="14" width="96" height="82" rx="8" fill="#FFF8F0" stroke="#2C2C2C" stroke-width="3"/>
          <!-- 대칭축 (점선) -->
          <line x1="70" y1="16" x2="70" y2="94" stroke="#C7B59A" stroke-width="2" stroke-dasharray="4 4"/>
          <!-- 나비 모양 대칭 패턴 (셀 18px), 왼쪽 칠해짐 + 오른쪽 거울 -->
          <!-- 왼쪽 (이미 칠해진 씨앗) -->
          <rect x="26" y="18" width="18" height="18" rx="3" fill="#CE93D8" stroke="#2C2C2C" stroke-width="2.5"/>
          <rect x="44" y="36" width="18" height="18" rx="3" fill="#CE93D8" stroke="#2C2C2C" stroke-width="2.5"/>
          <rect x="26" y="54" width="18" height="18" rx="3" fill="#CE93D8" stroke="#2C2C2C" stroke-width="2.5"/>
          <rect x="26" y="72" width="18" height="18" rx="3" fill="#CE93D8" stroke="#2C2C2C" stroke-width="2.5"/>
          <!-- 오른쪽 (거울 반사) -->
          <rect x="96" y="18" width="18" height="18" rx="3" fill="#AB47BC" stroke="#2C2C2C" stroke-width="2.5"/>
          <rect x="78" y="36" width="18" height="18" rx="3" fill="#AB47BC" stroke="#2C2C2C" stroke-width="2.5"/>
          <rect x="96" y="54" width="18" height="18" rx="3" fill="#AB47BC" stroke="#2C2C2C" stroke-width="2.5"/>
          <rect x="96" y="72" width="18" height="18" rx="3" fill="#AB47BC" stroke="#2C2C2C" stroke-width="2.5"/>
        </svg>
      </div>
      <p class="intro-text">칸을 칠해 좌우 대칭<br>그림을 완성해요!</p>
      <p class="intro-subtext">막힌 칸의 반대쪽을 칠하면 완성 · 먼저 맞춘 사람 승! · 3라운드</p>

      <div class="select-label">인원 선택</div>
      <div class="player-select-row">
        <button class="player-btn active" data-count="2">2명</button>
        <button class="player-btn" data-count="3">3명</button>
        <button class="player-btn" data-count="4">4명</button>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 1-5: 카운트다운 -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">

    <div class="top-bar" id="problemPanel">
      <div class="top-bar-meta">
        <div class="question-counter" id="questionCounter">1 / 3</div>
        <div class="problem-timer" id="problemTimer">60</div>
      </div>
      <div class="problem-status" id="problemStatus">양쪽이 똑같아지게 칸을 칠하세요!</div>
      <button class="icon-btn close-btn" id="closeBtn" aria-label="홈으로">✕</button>
    </div>

    <div class="zones-wrap" id="zonesWrap"></div>
    <div class="score-bar" id="scoreBar"></div>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <header class="result-header">
      <h2 class="result-title" id="resultTitle">게임 종료!</h2>
    </header>
    <div class="result-winner" id="resultWinner"></div>

    <div class="total-row" id="totalRow"></div>

    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js?v=12"></script>
  <script src="game.js"></script>
</body>
</html>
