<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>숫자 합치기</title>
  <link rel="stylesheet" href="../../shared/style.css?v=5">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <h1 class="game-title">숫자 합치기</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">
        <svg id="soundIconIntro" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
    </header>

    <div class="intro-body">
      <!-- 일러스트: 같은 두 수가 합쳐져 두 배가 되는 모습 -->
      <div class="intro-preview" aria-hidden="true">
        <svg viewBox="0 0 240 110" width="240" height="110">
          <rect x="14" y="34" width="48" height="48" rx="10" fill="#FFE0B2" stroke="#2C2C2C" stroke-width="3"/>
          <text x="38" y="66" text-anchor="middle" font-size="24" font-weight="900" fill="#2C2C2C">8</text>
          <text x="78" y="66" text-anchor="middle" font-size="28" font-weight="900" fill="#8E24AA">+</text>
          <rect x="98" y="34" width="48" height="48" rx="10" fill="#FFE0B2" stroke="#2C2C2C" stroke-width="3"/>
          <text x="122" y="66" text-anchor="middle" font-size="24" font-weight="900" fill="#2C2C2C">8</text>
          <text x="162" y="66" text-anchor="middle" font-size="24" font-weight="900" fill="#2C2C2C">=</text>
          <rect x="182" y="30" width="56" height="56" rx="10" fill="#FFB74D" stroke="#2C2C2C" stroke-width="3"/>
          <rect x="182" y="30" width="56" height="56" rx="10" fill="none" stroke="#2C2C2C" stroke-width="3" transform="translate(3,3)"/>
          <text x="210" y="68" text-anchor="middle" font-size="26" font-weight="900" fill="#2C2C2C">16</text>
        </svg>
      </div>

      <p class="intro-text">같은 수를 밀어 합치고 먼저 32를 만들어요!</p>
      <div class="badge-2p">👥 2인 대결</div>

      <div class="intro-rules">
        <div class="rule-item">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#8E24AA" stroke-width="2.5" stroke-linecap="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span>방향 버튼으로 칸을 한쪽으로 밀어요</span>
        </div>
        <div class="rule-item">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#FFA726" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          <span>같은 수끼리 만나면 두 배로 합쳐져요</span>
        </div>
        <div class="rule-item">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#EF5350" stroke-width="2.5" stroke-linecap="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
          <span>먼저 32 타일을 만들면 승리!</span>
        </div>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 1-5: 카운트다운 -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">
    <header class="game-header">
      <button class="icon-btn" id="closeBtn" aria-label="홈으로">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>

      <div class="round-banner">
        <span class="round-label">목표</span>
        <span class="round-num" id="roundNum">32</span>
      </div>

      <button class="sound-toggle" id="soundToggleGame" aria-label="사운드 토글">
        <svg id="soundIconGame" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
    </header>

    <div class="banner" id="banner"></div>

    <!-- 양쪽 보드 -->
    <div class="boards">
      <div class="board p1">
        <div class="board-label">🧒 P1 <span class="best" id="p1Best">최고 2</span></div>
        <div class="tile-grid" id="p1Grid"></div>
        <div class="dpad" id="p1Pad">
          <button class="dir-btn up"    type="button" data-player="1" data-dir="up"    aria-label="위로">▲</button>
          <button class="dir-btn left"  type="button" data-player="1" data-dir="left"  aria-label="왼쪽">◀</button>
          <button class="dir-btn down"  type="button" data-player="1" data-dir="down"  aria-label="아래로">▼</button>
          <button class="dir-btn right" type="button" data-player="1" data-dir="right" aria-label="오른쪽">▶</button>
        </div>
      </div>
      <div class="board p2">
        <div class="board-label">🧑 P2 <span class="best" id="p2Best">최고 2</span></div>
        <div class="tile-grid" id="p2Grid"></div>
        <div class="dpad" id="p2Pad">
          <button class="dir-btn up"    type="button" data-player="2" data-dir="up"    aria-label="위로">▲</button>
          <button class="dir-btn left"  type="button" data-player="2" data-dir="left"  aria-label="왼쪽">◀</button>
          <button class="dir-btn down"  type="button" data-player="2" data-dir="down"  aria-label="아래로">▼</button>
          <button class="dir-btn right" type="button" data-player="2" data-dir="right" aria-label="오른쪽">▶</button>
        </div>
      </div>
    </div>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <header class="game-header result-header">
      <div></div>
      <h2 class="result-header-title">대결 종료!</h2>
      <div></div>
    </header>

    <div class="result-body">
      <div class="result-icon-wrap" id="resultIconWrap">
        <svg viewBox="0 0 80 80" width="80" height="80" id="resultIcon">
          <rect x="28" y="62" width="24" height="6" rx="3" fill="#FFA726"/>
          <rect x="22" y="68" width="36" height="6" rx="3" fill="#FFA726"/>
          <path d="M15 18 Q15 50 40 54 Q65 50 65 18 Z" fill="#FFD54F" stroke="#FFA726" stroke-width="2"/>
          <path d="M15 18 Q8 18 8 28 Q8 40 20 42 Q15 35 15 26 Z" fill="#FFA726"/>
          <path d="M65 18 Q72 18 72 28 Q72 40 60 42 Q65 35 65 26 Z" fill="#FFA726"/>
          <ellipse cx="40" cy="20" rx="22" ry="6" fill="#FFE082"/>
          <text x="40" y="42" text-anchor="middle" font-size="16" font-weight="900" fill="#E65100">WIN</text>
        </svg>
      </div>
      <h2 class="result-title" id="resultTitle">P1 승리!</h2>
      <p class="result-sub" id="resultSub">먼저 32를 만들었어요!</p>
    </div>

    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js?v=12"></script>
  <script src="game.js"></script>

</body>
</html>
