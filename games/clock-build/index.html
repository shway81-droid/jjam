<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>시계 함께 맞추기</title>
  <link rel="stylesheet" href="../../shared/style.css?v=5">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <h1 class="game-title">시계 함께 맞추기</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">
        <svg id="soundIconIntro" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
    </header>

    <div class="intro-body">
      <div class="intro-preview" aria-hidden="true">
        <svg viewBox="0 0 240 120" width="240" height="120">
          <!-- 목표 시계 -->
          <circle cx="48" cy="60" r="40" fill="#FFFFFF" stroke="#2C2C2C" stroke-width="3"/>
          <circle cx="48" cy="60" r="40" fill="none" stroke="#2C2C2C" stroke-width="3" transform="translate(3,3)"/>
          <line x1="48" y1="60" x2="48" y2="36" stroke="#2C2C2C" stroke-width="5" stroke-linecap="round"/>
          <line x1="48" y1="60" x2="68" y2="60" stroke="#5C6BC0" stroke-width="4" stroke-linecap="round"/>
          <circle cx="48" cy="60" r="4" fill="#2C2C2C"/>
          <!-- 화살표 -->
          <text x="108" y="66" text-anchor="middle" font-size="22" font-weight="900" fill="#2C2C2C">←</text>
          <!-- P1 시 카드 -->
          <rect x="128" y="30" width="48" height="60" rx="10" fill="#C5CAE9" stroke="#2C2C2C" stroke-width="3"/>
          <text x="152" y="74" text-anchor="middle" font-size="30" font-weight="900" fill="#2C2C2C">3</text>
          <text x="152" y="24" text-anchor="middle" font-size="9" font-weight="800" fill="#3949AB">P1 시</text>
          <!-- P2 분 카드 -->
          <rect x="184" y="30" width="48" height="60" rx="10" fill="#FFCCBC" stroke="#2C2C2C" stroke-width="3"/>
          <text x="208" y="72" text-anchor="middle" font-size="24" font-weight="900" fill="#2C2C2C">15</text>
          <text x="208" y="24" text-anchor="middle" font-size="9" font-weight="800" fill="#D84315">P2 분</text>
        </svg>
      </div>

      <p class="intro-text">목표 시계를 읽고, 시와 분을 골라 맞춰요!</p>
      <div class="badge-2p">👥 2인 협력</div>

      <div class="intro-rules">
        <div class="rule-item">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#5C6BC0" stroke-width="2.5" stroke-linecap="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          <span>P1은 '시(時)', P2는 '분(分)' 카드를 선택</span>
        </div>
        <div class="rule-item">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#FFA726" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          <span>둘이 고른 시각이 목표 시계와 같으면 성공!</span>
        </div>
        <div class="rule-item">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#EF5350" stroke-width="2.5" stroke-linecap="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
          <span>5라운드 · 정각 → 30분 → 5분 단위로 점점 어려워져요</span>
        </div>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 1-5: 카운트다운 -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">
    <header class="game-header">
      <button class="icon-btn" id="closeBtn" aria-label="홈으로">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>

      <div class="round-banner">
        <span class="round-label">라운드</span>
        <span class="round-num" id="roundNum">1/5</span>
        <span class="round-score" id="roundScore">★ 0</span>
      </div>

      <button class="sound-toggle" id="soundToggleGame" aria-label="사운드 토글">
        <svg id="soundIconGame" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
    </header>

    <!-- 목표 + 진행 표시 -->
    <div class="target-area">
      <div class="target-clock" id="targetClock"></div>
      <div class="target-row">
        <div class="target-pick p1">
          <span class="target-pick-label">P1 시</span>
          <span class="target-pick-val" id="p1Pick">?</span>
        </div>
        <span class="target-equals">:</span>
        <div class="target-pick p2">
          <span class="target-pick-label">P2 분</span>
          <span class="target-pick-val" id="p2Pick">?</span>
        </div>
      </div>
      <div class="banner" id="banner"></div>
    </div>

    <!-- 양쪽 보드 -->
    <div class="boards">
      <div class="board p1">
        <div class="board-label">🧒 P1 · 시</div>
        <div class="card-grid" id="p1Cards"></div>
      </div>
      <div class="board p2">
        <div class="board-label">🧑 P2 · 분</div>
        <div class="card-grid" id="p2Cards"></div>
      </div>
    </div>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <header class="game-header result-header">
      <div></div>
      <h2 class="result-header-title">협력 종료!</h2>
      <div></div>
    </header>

    <div class="result-body">
      <div class="result-icon-wrap" id="resultIconWrap">
        <svg viewBox="0 0 80 80" width="80" height="80" id="resultIcon">
          <circle cx="40" cy="40" r="32" fill="#FFD54F" stroke="#2C2C2C" stroke-width="3"/>
          <text x="40" y="52" text-anchor="middle" font-size="32">🕐</text>
        </svg>
      </div>
      <h2 class="result-title" id="resultTitle">5/5</h2>
      <p class="result-sub" id="resultSub">완벽한 협력이에요!</p>
    </div>

    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js?v=12"></script>
  <script src="game.js"></script>

</body>
</html>
