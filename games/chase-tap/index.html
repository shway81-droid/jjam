<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>점프하는 표적</title>
  <link rel="stylesheet" href="../../shared/style.css?v=5">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
      <h1 class="game-title">점프하는 표적</h1>
      <button class="icon-btn sound-btn" id="soundToggleIntro" aria-label="사운드 토글">🔇</button>
    </header>

    <div class="intro-body">
      <div class="intro-illustration" aria-hidden="true">
        <svg viewBox="0 0 140 120" width="140" height="120">
          <!-- Trail dashes showing target movement -->
          <path d="M22 40 Q44 80 68 50 Q92 24 116 70" fill="none" stroke="#FFD54F" stroke-width="3" stroke-dasharray="4 6" stroke-linecap="round"/>
          <!-- Ghost previous positions -->
          <circle cx="22" cy="40" r="12" fill="#B3E5FC" stroke="#2C2C2C" stroke-width="2.5" opacity="0.55"/>
          <circle cx="22" cy="40" r="5" fill="#EF5350" opacity="0.55"/>
          <circle cx="68" cy="50" r="11" fill="#C8E6C9" stroke="#2C2C2C" stroke-width="2.5" opacity="0.7"/>
          <circle cx="68" cy="50" r="4.5" fill="#EF5350" opacity="0.7"/>
          <!-- Current target (big, bright) -->
          <circle cx="116" cy="70" r="18" fill="#FFE0B2" stroke="#2C2C2C" stroke-width="3"/>
          <circle cx="116" cy="70" r="12" fill="#FFD54F" stroke="#2C2C2C" stroke-width="2"/>
          <circle cx="116" cy="70" r="6" fill="#EF5350" stroke="#2C2C2C" stroke-width="1.5"/>
          <!-- Tap finger above current target -->
          <g transform="translate(106 24)">
            <rect x="6" y="6" width="10" height="20" rx="5" fill="#FFD7A8" stroke="#2C2C2C" stroke-width="2"/>
            <ellipse cx="11" cy="8" rx="6" ry="5" fill="#FFD7A8" stroke="#2C2C2C" stroke-width="2"/>
          </g>
          <!-- Sparks around target -->
          <line x1="100" y1="56" x2="94" y2="50" stroke="#FFD54F" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="132" y1="56" x2="138" y2="50" stroke="#FFD54F" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="100" y1="84" x2="94" y2="90" stroke="#FFD54F" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="132" y1="84" x2="138" y2="90" stroke="#FFD54F" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>

      <p class="intro-desc">표적이 이리저리 점프해요!</p>
      <p class="intro-sub">30초 동안 가장 많이 터치한 플레이어가 승리!</p>

      <div class="player-select-wrap">
        <p class="player-select-label">인원 선택</p>
        <div class="player-select" id="playerSelect">
          <button class="player-btn active" data-count="2">2명</button>
          <button class="player-btn" data-count="3">3명</button>
          <button class="player-btn" data-count="4">4명</button>
        </div>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 2: 카운트다운 -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- 화면 3: 게임 -->
  <section class="screen screen-game" id="gameScreen">
    <div class="game-hud" id="gameHud">
      <div class="hud-timer-wrap">
        <div class="hud-timer-bar">
          <div class="hud-timer-fill" id="timerFill"></div>
        </div>
        <span class="hud-timer-text" id="timerText">30</span>
      </div>
      <div class="hud-scores" id="hudScores"></div>
      <button class="icon-btn hud-close" id="closeBtn" aria-label="홈으로">✕</button>
    </div>

    <div class="game-zones" id="gameZones"></div>
  </section>

  <!-- 화면 4: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <div class="result-body">
      <div class="result-crown">
        <svg viewBox="0 0 80 60" width="80" height="60">
          <polygon points="10,50 20,20 40,35 60,20 70,50" fill="#FFD700" stroke="#FFA000" stroke-width="2" stroke-linejoin="round"/>
          <circle cx="10" cy="50" r="5" fill="#FFD700" stroke="#FFA000" stroke-width="2"/>
          <circle cx="70" cy="50" r="5" fill="#FFD700" stroke="#FFA000" stroke-width="2"/>
          <circle cx="40" cy="16" r="5" fill="#FFD700" stroke="#FFA000" stroke-width="2"/>
          <rect x="8" y="50" width="64" height="8" rx="4" fill="#FFD700" stroke="#FFA000" stroke-width="2"/>
        </svg>
      </div>
      <h2 class="result-winner-label" id="resultWinnerLabel">승자</h2>
      <div class="result-winner-name" id="resultWinnerName">P1</div>
      <div class="result-scores" id="resultScores"></div>
    </div>
    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js?v=7"></script>
  <script src="game.js"></script>
</body>
</html>
