<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>텔레파시</title>
  <link rel="stylesheet" href="../../shared/style.css?v=5">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <h1 class="game-title">텔레파시</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">
        <svg id="soundIconIntro" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
    </header>

    <div class="intro-body">
      <!-- 일러스트: 두 카드가 같은 그림 + 텔레파시 -->
      <div class="intro-preview" aria-hidden="true">
        <svg viewBox="0 0 240 110" width="240" height="110">
          <!-- P1 카드 -->
          <rect x="14" y="22" width="62" height="78" rx="10" fill="#B3E5FC" stroke="#2C2C2C" stroke-width="3"/>
          <rect x="14" y="22" width="62" height="78" rx="10" fill="none" stroke="#2C2C2C" stroke-width="3" transform="translate(4,4)"/>
          <text x="45" y="74" text-anchor="middle" font-size="30">🍎</text>
          <text x="45" y="16" text-anchor="middle" font-size="9" font-weight="800" fill="#1565C0">P1</text>

          <!-- 텔레파시 전파 -->
          <text x="120" y="46" text-anchor="middle" font-size="26">💫</text>
          <path d="M88 64 q10 -8 20 0" fill="none" stroke="#7B1FA2" stroke-width="3" stroke-linecap="round" stroke-dasharray="2,5"/>
          <path d="M132 64 q10 -8 20 0" fill="none" stroke="#7B1FA2" stroke-width="3" stroke-linecap="round" stroke-dasharray="2,5"/>
          <text x="120" y="92" text-anchor="middle" font-size="11" font-weight="900" fill="#7B1FA2">통했다!</text>

          <!-- P2 카드 -->
          <rect x="164" y="22" width="62" height="78" rx="10" fill="#FFCDD2" stroke="#2C2C2C" stroke-width="3"/>
          <rect x="164" y="22" width="62" height="78" rx="10" fill="none" stroke="#2C2C2C" stroke-width="3" transform="translate(4,4)"/>
          <text x="195" y="74" text-anchor="middle" font-size="30">🍎</text>
          <text x="195" y="16" text-anchor="middle" font-size="9" font-weight="800" fill="#C62828">P2</text>
        </svg>
      </div>

      <p class="intro-text">마음이 통하면 텔레파시 성공!</p>
      <div class="badge-2p">👥 2인 협력</div>

      <div class="intro-rules">
        <div class="rule-item">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#7B1FA2" stroke-width="2.5" stroke-linecap="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span>P1이 먼저 몰래 선택 (P2는 눈 감기!)</span>
        </div>
        <div class="rule-item">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#FFA726" stroke-width="2.5" stroke-linecap="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M5 12a7 7 0 0 1 14 0"/>
            <path d="M2 12a10 10 0 0 1 20 0"/>
          </svg>
          <span>P2도 같은 4개 중 하나를 선택</span>
        </div>
        <div class="rule-item">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#EF5350" stroke-width="2.5" stroke-linecap="round">
            <polygon points="12 2 15 9 22 9.3 16.5 14 18.5 21 12 17 5.5 21 7.5 14 2 9.3 9 9"/>
          </svg>
          <span>7라운드 중 4번 통하면 찰떡 콤비!</span>
        </div>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 1-5: 카운트다운 -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">
    <header class="game-header">
      <button class="icon-btn" id="closeBtn" aria-label="홈으로">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>

      <div class="round-banner">
        <span class="round-label">라운드</span>
        <span class="round-num" id="roundNum">1/7</span>
        <span class="round-score" id="roundScore">💫 0</span>
      </div>

      <button class="sound-toggle" id="soundToggleGame" aria-label="사운드 토글">
        <svg id="soundIconGame" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
    </header>

    <!-- 주제 질문 -->
    <div class="topic-area">
      <div class="topic-card" id="topicText">🍎 과일 하면 떠오르는 것은?</div>
    </div>

    <!-- 두 사람의 선택 (공개 연출용 뒤집기 카드) -->
    <div class="telepathy-row" id="telepathyRow">
      <div class="pick-card p1" id="p1PickCard">
        <span class="pick-label">P1</span>
        <div class="flip-box">
          <div class="flipper">
            <div class="face front">❓</div>
            <div class="face back">
              <span class="pv-emoji" id="p1RevealEmoji"></span>
              <span class="pv-name" id="p1RevealName"></span>
            </div>
          </div>
        </div>
      </div>
      <span class="telepathy-mark" id="telepathyMark">💫</span>
      <div class="pick-card p2" id="p2PickCard">
        <span class="pick-label">P2</span>
        <div class="flip-box">
          <div class="flipper">
            <div class="face front">❓</div>
            <div class="face back">
              <span class="pv-emoji" id="p2RevealEmoji"></span>
              <span class="pv-name" id="p2RevealName"></span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 결과 배너 -->
    <div class="banner" id="banner"></div>

    <!-- 선택 카드 (하단, 크게) -->
    <div class="choice-area">
      <div class="choice-grid" id="choiceGrid"></div>
    </div>

    <!-- 차례 안내 오버레이 -->
    <div class="turn-overlay" id="turnOverlay">
      <div class="overlay-card">
        <span class="overlay-emoji" id="overlayEmoji">🙈</span>
        <h3 class="overlay-title" id="overlayTitle">P1 차례!</h3>
        <p class="overlay-sub" id="overlaySub">P2는 눈을 감아요!</p>
        <button class="btn btn-primary overlay-btn" id="overlayBtn">P1 시작!</button>
      </div>
    </div>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <header class="game-header result-header">
      <div></div>
      <h2 class="result-header-title">텔레파시 결과!</h2>
      <div></div>
    </header>

    <div class="result-body">
      <div class="result-icon-wrap" id="resultIconWrap">
        <svg viewBox="0 0 80 80" width="80" height="80">
          <circle cx="40" cy="40" r="32" fill="#E1BEE7" stroke="#2C2C2C" stroke-width="3"/>
          <text x="40" y="52" text-anchor="middle" font-size="32">💫</text>
        </svg>
      </div>
      <h2 class="result-title" id="resultTitle">0/7 일치</h2>
      <p class="result-sub" id="resultSub">찰떡 콤비!</p>
    </div>

    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js?v=12"></script>
  <script src="game.js"></script>

</body>
</html>
