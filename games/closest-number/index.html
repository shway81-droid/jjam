<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>가까운 수</title>
  <link rel="stylesheet" href="../../shared/style.css?v=5">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
      <h1 class="game-title">가까운 수</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔊</button>
    </header>

    <div class="intro-body">
      <div class="intro-illust">
        <svg viewBox="0 0 220 120" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="4" width="212" height="112" rx="16" fill="#FFF8E1" stroke="#2C2C2C" stroke-width="3"/>
          <text x="110" y="42" text-anchor="middle" font-size="28" font-weight="900" fill="#1E88E5">🎯</text>
          <text x="110" y="72" text-anchor="middle" font-size="22" font-weight="900" fill="#2C2C2C">목표: 73</text>
          <rect x="24" y="84" width="50" height="24" rx="8" fill="#BBDEFB" stroke="#1E88E5" stroke-width="2"/>
          <text x="49" y="101" text-anchor="middle" font-size="13" font-weight="800" fill="#1565C0">70</text>
          <rect x="84" y="84" width="50" height="24" rx="8" fill="#A5D6A7" stroke="#388E3C" stroke-width="2.5"/>
          <text x="109" y="101" text-anchor="middle" font-size="13" font-weight="900" fill="#1B5E20">75</text>
          <rect x="144" y="84" width="50" height="24" rx="8" fill="#BBDEFB" stroke="#1E88E5" stroke-width="2"/>
          <text x="169" y="101" text-anchor="middle" font-size="13" font-weight="800" fill="#1565C0">60</text>
        </svg>
      </div>
      <p class="intro-text">🎯 목표 수에<br>가장 가까운 수를 골라요!</p>
      <p class="intro-subtext">오답은 라운드 실격 · 8라운드 승부</p>

      <div class="select-label">인원 선택</div>
      <div class="player-select-row">
        <button class="player-btn active" data-count="2">2명</button>
        <button class="player-btn" data-count="3">3명</button>
        <button class="player-btn" data-count="4">4명</button>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 1-5: 카운트다운 -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">
    <div class="top-bar" id="problemPanel">
      <div class="top-bar-meta">
        <div class="question-counter" id="questionCounter">1 / 8</div>
        <div class="problem-timer" id="problemTimer">12</div>
      </div>
      <div class="problem-panel-body">
        <div class="target-display">
          <span class="target-icon">🎯</span>
          <div class="target-info">
            <div class="target-label">목표 수</div>
            <div class="target-number" id="targetNumber">—</div>
          </div>
        </div>
        <div class="number-line-wrap" id="numberLineWrap">
          <div class="number-line-bar"></div>
          <div class="number-line-target" id="numberLineTarget"></div>
        </div>
        <div class="problem-status" id="problemStatus"></div>
      </div>
      <button class="icon-btn close-btn" id="closeBtn" aria-label="홈으로">✕</button>
    </div>

    <div class="zones-wrap" id="zonesWrap"></div>
    <div class="score-bar" id="scoreBar"></div>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <header class="result-header">
      <h2 class="result-title" id="resultTitle">게임 종료!</h2>
    </header>
    <div class="result-winner" id="resultWinner"></div>

    <div class="result-table-wrap">
      <table class="result-table" id="resultTable">
        <thead id="resultTableHead"></thead>
        <tbody id="resultTableBody"></tbody>
      </table>
    </div>

    <div class="total-row" id="totalRow"></div>

    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js?v=11"></script>
  <script src="game.js"></script>
</body>
</html>
