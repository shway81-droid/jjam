<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>수직선 짝꿍</title>
  <link rel="stylesheet" href="../../shared/style.css?v=5">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <h1 class="game-title">수직선 짝꿍</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">
        <svg id="soundIconIntro" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
    </header>

    <div class="intro-body">
      <!-- 일러스트: 수직선 + 목표가 한가운데 -->
      <div class="intro-preview" aria-hidden="true">
        <svg viewBox="0 0 240 100" width="240" height="100">
          <!-- 수직선 -->
          <line x1="16" y1="58" x2="224" y2="58" stroke="#2C2C2C" stroke-width="3"/>
          <!-- 눈금 -->
          <g stroke="#2C2C2C" stroke-width="2">
            <line x1="40" y1="52" x2="40" y2="64"/>
            <line x1="120" y1="50" x2="120" y2="66"/>
            <line x1="200" y1="52" x2="200" y2="64"/>
          </g>
          <!-- P1 마커 (왼쪽) -->
          <polygon points="40,44 33,30 47,30" fill="#1565C0" stroke="#2C2C2C" stroke-width="2"/>
          <!-- P2 마커 (오른쪽) -->
          <polygon points="200,44 193,30 207,30" fill="#C62828" stroke="#2C2C2C" stroke-width="2"/>
          <!-- 목표 별 (가운데) -->
          <circle cx="120" cy="40" r="16" fill="#FFD54F" stroke="#2C2C2C" stroke-width="3"/>
          <text x="120" y="46" text-anchor="middle" font-size="15" font-weight="900" fill="#2C2C2C">10</text>
          <!-- 같은 거리 표시 -->
          <text x="80" y="82" text-anchor="middle" font-size="11" font-weight="800" fill="#00838F">← 4 →</text>
          <text x="160" y="82" text-anchor="middle" font-size="11" font-weight="800" fill="#00838F">← 4 →</text>
        </svg>
      </div>

      <p class="intro-text">목표가 딱 한가운데 오게 맞춰요!</p>
      <div class="badge-2p">👥 2인 협력</div>

      <div class="intro-rules">
        <div class="rule-item">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#00ACC1" stroke-width="2.5" stroke-linecap="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <span>P1은 왼쪽 수, P2는 오른쪽 수를 하나씩 골라요</span>
        </div>
        <div class="rule-item">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#FFA726" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          <span>목표에서 두 수의 거리가 같으면 성공!</span>
        </div>
        <div class="rule-item">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#EF5350" stroke-width="2.5" stroke-linecap="round">
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
          </svg>
          <span>5라운드 · 함께 협력해서 점수를 모아요</span>
        </div>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 1-5: 카운트다운 -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">
    <header class="game-header">
      <button class="icon-btn" id="closeBtn" aria-label="홈으로">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>

      <div class="round-banner">
        <span class="round-label">라운드</span>
        <span class="round-num" id="roundNum">1/5</span>
        <span class="round-score" id="roundScore">★ 0</span>
      </div>

      <button class="sound-toggle" id="soundToggleGame" aria-label="사운드 토글">
        <svg id="soundIconGame" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
    </header>

    <!-- 목표 + 수직선 -->
    <div class="target-area">
      <div class="goal-row">
        <span class="goal-label">목표 수</span>
        <span class="goal-val" id="targetVal">10</span>
        <span class="goal-hint">이 한가운데 오게!</span>
      </div>

      <div class="numline" id="numline">
        <div class="nl-track"></div>
        <div class="nl-ticks" id="nlTicks"></div>
        <div class="nl-target" id="nlTarget"><span class="nl-target-star">★</span></div>
        <div class="nl-marker p1" id="nlP1"><span class="nl-pin"></span><span class="nl-mval" id="nlP1Val"></span></div>
        <div class="nl-marker p2" id="nlP2"><span class="nl-pin"></span><span class="nl-mval" id="nlP2Val"></span></div>
      </div>

      <div class="dist-row">
        <div class="dist-chip p1">P1 거리 <b id="p1Dist">?</b></div>
        <div class="dist-eq" id="distEq">=?</div>
        <div class="dist-chip p2">P2 거리 <b id="p2Dist">?</b></div>
      </div>

      <div class="banner" id="banner"></div>
    </div>

    <!-- 양쪽 보드 -->
    <div class="boards">
      <div class="board p1">
        <div class="board-label">🧒 P1 · 왼쪽 수</div>
        <div class="card-grid" id="p1Cards"></div>
      </div>
      <div class="board p2">
        <div class="board-label">🧑 P2 · 오른쪽 수</div>
        <div class="card-grid" id="p2Cards"></div>
      </div>
    </div>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <header class="game-header result-header">
      <div></div>
      <h2 class="result-header-title">협력 종료!</h2>
      <div></div>
    </header>

    <div class="result-body">
      <div class="result-icon-wrap" id="resultIconWrap">
        <svg viewBox="0 0 80 80" width="80" height="80" id="resultIcon">
          <rect x="28" y="62" width="24" height="6" rx="3" fill="#FFA726"/>
          <rect x="22" y="68" width="36" height="6" rx="3" fill="#FFA726"/>
          <path d="M15 18 Q15 50 40 54 Q65 50 65 18 Z" fill="#FFD54F" stroke="#FFA726" stroke-width="2"/>
          <path d="M15 18 Q8 18 8 28 Q8 40 20 42 Q15 35 15 26 Z" fill="#FFA726"/>
          <path d="M65 18 Q72 18 72 28 Q72 40 60 42 Q65 35 65 26 Z" fill="#FFA726"/>
          <ellipse cx="40" cy="20" rx="22" ry="6" fill="#FFE082"/>
          <text x="40" y="42" text-anchor="middle" font-size="16" font-weight="900" fill="#E65100">WIN</text>
        </svg>
      </div>
      <h2 class="result-title" id="resultTitle">5/5</h2>
      <p class="result-sub" id="resultSub">완벽한 협력이에요!</p>
    </div>

    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js?v=12"></script>
  <script src="game.js"></script>

</body>
</html>
