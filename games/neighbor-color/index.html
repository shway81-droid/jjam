<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>이웃 다른 색</title>
  <link rel="stylesheet" href="../../shared/style.css?v=5">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
      <h1 class="game-title">🌈 이웃 다른 색</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔊</button>
    </header>

    <div class="intro-body">
      <div class="intro-illustration" aria-hidden="true">
        <svg viewBox="0 0 130 110" width="130" height="110">
          <!-- 3x3 미니 보드: 이웃끼리 다른 색 -->
          <rect x="13" y="20" width="104" height="70" rx="8" fill="#FFF8F0" stroke="#2C2C2C" stroke-width="3"/>
          <rect x="20" y="27" width="28" height="28" rx="5" fill="#EF9A9A" stroke="#2C2C2C" stroke-width="2.5"/>
          <rect x="51" y="27" width="28" height="28" rx="5" fill="#90CAF9" stroke="#2C2C2C" stroke-width="2.5"/>
          <rect x="82" y="27" width="28" height="28" rx="5" fill="#EF9A9A" stroke="#2C2C2C" stroke-width="2.5"/>
          <rect x="20" y="58" width="28" height="28" rx="5" fill="#A5D6A7" stroke="#2C2C2C" stroke-width="2.5"/>
          <rect x="51" y="58" width="28" height="28" rx="5" fill="#FFE082" stroke="#2C2C2C" stroke-width="2.5"/>
          <rect x="82" y="58" width="28" height="28" rx="5" fill="#A5D6A7" stroke="#2C2C2C" stroke-width="2.5"/>
          <text x="65" y="14" text-anchor="middle" font-size="12" font-weight="900" fill="#26A69A">맞닿은 칸은 다른 색!</text>
        </svg>
      </div>
      <p class="intro-text">맞닿은 이웃과<br>다른 색으로 모두 칠해요!</p>
      <p class="intro-subtext">위·아래·옆·대각선(8방향) 이웃과 같은 색 금지 · 먼저 완성 승! · 3라운드</p>

      <div class="select-label">인원 선택</div>
      <div class="player-select-row">
        <button class="player-btn active" data-count="2">2명</button>
        <button class="player-btn" data-count="3">3명</button>
        <button class="player-btn" data-count="4">4명</button>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 1-5: 카운트다운 -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">

    <div class="top-bar" id="problemPanel">
      <div class="top-bar-meta">
        <div class="question-counter" id="questionCounter">1 / 3</div>
        <div class="problem-timer" id="problemTimer">60</div>
      </div>
      <div class="problem-status" id="problemStatus">이웃(8방향)과 다른 색으로 모두 칠하세요!</div>
      <button class="icon-btn close-btn" id="closeBtn" aria-label="홈으로">✕</button>
    </div>

    <div class="zones-wrap" id="zonesWrap"></div>
    <div class="score-bar" id="scoreBar"></div>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <header class="result-header">
      <h2 class="result-title" id="resultTitle">게임 종료!</h2>
    </header>
    <div class="result-winner" id="resultWinner"></div>

    <div class="total-row" id="totalRow"></div>

    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js?v=12"></script>
  <script src="game.js"></script>
</body>
</html>
