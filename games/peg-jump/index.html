<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>콩콩 점프</title>
  <link rel="stylesheet" href="../../shared/style.css?v=5">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
      <h1 class="game-title">콩콩 점프</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔊</button>
    </header>

    <div class="intro-body">
      <div class="intro-illustration" aria-hidden="true">
        <svg viewBox="0 0 120 120" width="120" height="120">
          <!-- 보드 구멍 (빈 칸) -->
          <circle cx="22" cy="22" r="11" fill="#FFF8E1" stroke="#2C2C2C" stroke-width="3"/>
          <circle cx="98" cy="22" r="11" fill="#FFF8E1" stroke="#2C2C2C" stroke-width="3"/>
          <circle cx="22" cy="98" r="11" fill="#FFF8E1" stroke="#2C2C2C" stroke-width="3"/>
          <!-- 가만히 있는 콩 -->
          <circle cx="98" cy="98" r="11" fill="#8D6E63" stroke="#2C2C2C" stroke-width="3"/>
          <!-- 뛰어넘는 중간 콩 (잡히는 콩) -->
          <circle cx="60" cy="60" r="11" fill="#A1887F" stroke="#2C2C2C" stroke-width="3" stroke-dasharray="4,3"/>
          <!-- 점프하는 콩 (호를 그리며 이동) -->
          <path d="M 30 78 Q 60 18 90 78" fill="none" stroke="#2C2C2C" stroke-width="3" stroke-dasharray="5,4"/>
          <circle cx="60" cy="34" r="12" fill="#8D6E63" stroke="#2C2C2C" stroke-width="3"/>
        </svg>
      </div>
      <p class="intro-text">콩을 뛰어넘어 잡고<br>마지막 한 알만 남겨요!</p>
      <p class="intro-subtext">먼저 한 알로 만든 사람 승! · 3라운드 승부</p>

      <div class="rule-list">
        <div class="rule-item">🫘 콩을 톡 누르면 갈 수 있는 칸이 반짝여요</div>
        <div class="rule-item">↗️ 빈 칸을 누르면 사이의 콩을 뛰어넘어 잡아요</div>
        <div class="rule-item">🏁 콩이 한 알만 남으면 라운드 승리!</div>
      </div>

      <div class="select-label">인원 선택</div>
      <div class="player-select-row">
        <button class="player-btn active" data-count="2">2명</button>
        <button class="player-btn" data-count="3">3명</button>
        <button class="player-btn" data-count="4">4명</button>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 1-5: 카운트다운 -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">

    <div class="top-bar" id="problemPanel">
      <div class="top-bar-meta">
        <div class="question-counter" id="questionCounter">1 / 3</div>
        <div class="problem-timer" id="problemTimer">90</div>
      </div>
      <div class="problem-status" id="problemStatus">콩을 뛰어넘어 한 알만 남기세요!</div>
      <button class="icon-btn close-btn" id="closeBtn" aria-label="홈으로">✕</button>
    </div>

    <div class="zones-wrap" id="zonesWrap"></div>
    <div class="score-bar" id="scoreBar"></div>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <header class="result-header">
      <h2 class="result-title" id="resultTitle">게임 종료!</h2>
    </header>
    <div class="result-winner" id="resultWinner"></div>

    <div class="total-row" id="totalRow"></div>

    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js?v=12"></script>
  <script src="game.js"></script>
</body>
</html>
