<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>뛰어 세기 짝꿍</title>
  <link rel="stylesheet" href="../../shared/style.css?v=5">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <h1 class="game-title">뛰어 세기 짝꿍</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">
        <svg id="soundIconIntro" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
    </header>

    <div class="intro-body">
      <div class="intro-preview" aria-hidden="true">
        <svg viewBox="0 0 240 120" width="240" height="120">
          <rect x="14" y="20" width="40" height="40" rx="10" fill="#B3E5FC" stroke="#2C2C2C" stroke-width="3"/>
          <text x="34" y="47" text-anchor="middle" font-size="20" font-weight="900" fill="#2C2C2C">2</text>
          <text x="64" y="46" text-anchor="middle" font-size="18" font-weight="900" fill="#43A047">+2</text>
          <rect x="78" y="20" width="40" height="40" rx="10" fill="#FFCDD2" stroke="#2C2C2C" stroke-width="3"/>
          <text x="98" y="47" text-anchor="middle" font-size="20" font-weight="900" fill="#2C2C2C">4</text>
          <text x="128" y="46" text-anchor="middle" font-size="18" font-weight="900" fill="#43A047">+2</text>
          <rect x="142" y="20" width="40" height="40" rx="10" fill="#B3E5FC" stroke="#2C2C2C" stroke-width="3"/>
          <text x="162" y="47" text-anchor="middle" font-size="20" font-weight="900" fill="#2C2C2C">6</text>
          <text x="206" y="46" text-anchor="middle" font-size="26" font-weight="900" fill="#FB8C00">?</text>
          <text x="120" y="92" text-anchor="middle" font-size="14" font-weight="900" fill="#5E35B1">다음 수는 누구 칸에?</text>
          <text x="120" y="110" text-anchor="middle" font-size="12" font-weight="700" fill="#555">8을 가진 사람이 콕!</text>
        </svg>
      </div>

      <p class="intro-text">규칙대로 다음 수를 둘이 번갈아 이어요!</p>
      <div class="badge-2p">👥 2인 협력</div>

      <div class="intro-rules">
        <div class="rule-item">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#1565C0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/><line x1="12" y1="5" x2="12" y2="19"/>
          </svg>
          <span>규칙(+2·+3·×2…)대로 다음 수를 계산해요</span>
        </div>
        <div class="rule-item">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#43A047" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><polyline points="8 12 11 15 16 9"/>
          </svg>
          <span>그 수는 내 칸·짝꿍 칸 중 한 곳에! 가진 사람이 콕</span>
        </div>
        <div class="rule-item">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#EF5350" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
          </svg>
          <span>틀린 수를 누르면 잠깐 멈춤! 60초 동안 길게 이어요</span>
        </div>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 1-5: 카운트다운 -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">
    <header class="game-header">
      <button class="icon-btn" id="closeBtn" aria-label="홈으로">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>

      <div class="round-banner">
        <span class="round-label">시간</span>
        <span class="round-num" id="timeNum">60</span>
        <span class="round-score" id="roundScore">★ 0</span>
      </div>

      <button class="sound-toggle" id="soundToggleGame" aria-label="사운드 토글">
        <svg id="soundIconGame" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
    </header>

    <!-- 중앙: 규칙 + 이어진 수열 + 다음 칸 -->
    <div class="board-area">
      <div class="rule-chip" id="ruleChip">규칙 +2</div>
      <div class="chain" id="chain"></div>
      <div class="banner" id="banner"></div>
    </div>

    <!-- 양쪽 숫자 타일 존: P1 / P2 -->
    <div class="zones">
      <div class="zone p1">
        <div class="zone-label">🧒 P1</div>
        <div class="tile-grid" id="p1Tiles"></div>
      </div>
      <div class="zone p2">
        <div class="zone-label">🧑 P2</div>
        <div class="tile-grid" id="p2Tiles"></div>
      </div>
    </div>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <header class="game-header result-header">
      <div></div>
      <h2 class="result-header-title">협력 종료!</h2>
      <div></div>
    </header>

    <div class="result-body">
      <div class="result-icon-wrap" id="resultIconWrap">
        <svg viewBox="0 0 80 80" width="80" height="80">
          <circle cx="40" cy="40" r="32" fill="#FFE082" stroke="#2C2C2C" stroke-width="3"/>
          <text x="40" y="52" text-anchor="middle" font-size="32">🤝</text>
        </svg>
      </div>
      <h2 class="result-title" id="resultTitle">0</h2>
      <p class="result-sub" id="resultSub">완벽한 협력이에요!</p>
    </div>

    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js?v=12"></script>
  <script src="game.js"></script>

</body>
</html>
