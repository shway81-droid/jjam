<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>주사위 굴리기</title>
  <link rel="stylesheet" href="../../shared/style.css?v=5">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
      <h1 class="game-title">주사위 굴리기</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔊</button>
    </header>
    <div class="intro-body">
      <div class="intro-illustration" aria-hidden="true">
        <svg viewBox="0 0 120 120" width="120" height="120">
          <rect x="4" y="4" width="112" height="112" rx="10" fill="#FFE0B2" stroke="#2C2C2C" stroke-width="3"/>
          <rect x="14" y="14" width="92" height="92" rx="6" fill="#FFF3E0" stroke="#2C2C2C" stroke-width="2"/>
          <rect x="20" y="20" width="38" height="38" rx="8" fill="#FFFFFF" stroke="#2C2C2C" stroke-width="3"/>
          <text x="39" y="48" font-size="22" text-anchor="middle" font-weight="900">3</text>
          <path d="M62 39 L88 39" stroke="#F4511E" stroke-width="3" fill="none"/>
          <text x="98" y="44" font-size="16" text-anchor="middle">🚩</text>
          <rect x="68" y="64" width="38" height="38" rx="8" fill="#FFCC80" stroke="#2C2C2C" stroke-width="3"/>
          <text x="87" y="92" font-size="20" text-anchor="middle" font-weight="900" fill="#E65100">5</text>
          <text x="44" y="92" font-size="11" text-anchor="middle" fill="#E65100" font-weight="bold">데구르르</text>
        </svg>
      </div>
      <p class="intro-text">주사위를 굴려 깃발🚩 칸으로!<br>윗면 숫자가 목표와 같아야 성공!</p>
      <p class="intro-subtext">한 칸씩 굴리면 윗면이 바뀌어요 · ↺로 처음부터 · 4라운드</p>
      <div class="player-select-row">
        <button class="player-btn active" data-count="2">2명</button>
        <button class="player-btn" data-count="3">3명</button>
        <button class="player-btn" data-count="4">4명</button>
      </div>
    </div>
    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <section class="screen screen-game" id="gameScreen">
    <div class="top-bar" id="problemPanel">
      <div class="top-bar-meta">
        <div class="question-counter" id="questionCounter">1 / 4</div>
        <div class="problem-timer" id="problemTimer">60</div>
      </div>
      <div class="problem-status" id="problemStatus">주사위🎲를 깃발🚩 위로!</div>
      <button class="icon-btn close-btn" id="closeBtn" aria-label="홈으로">✕</button>
    </div>
    <div class="zones-wrap p2" id="zonesWrap"></div>
    <div class="score-bar" id="scoreBar"></div>
  </section>

  <section class="screen screen-result" id="resultScreen">
    <header class="result-header">
      <h2 class="result-title" id="resultTitle">게임 종료!</h2>
    </header>
    <div class="result-winner" id="resultWinner"></div>
    <div class="total-row" id="totalRow"></div>
    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js?v=12"></script>
  <script src="game.js"></script>
</body>
</html>
