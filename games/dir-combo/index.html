<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>방향 콤비</title>
  <link rel="stylesheet" href="../../shared/style.css?v=5">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <h1 class="game-title">방향 콤비</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">
        <svg id="soundIconIntro" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
    </header>

    <div class="intro-body">
      <!-- 일러스트: 격자 + 로켓 + 깃발 + 경로 화살표 -->
      <div class="intro-preview" aria-hidden="true">
        <svg viewBox="0 0 240 120" width="240" height="120">
          <!-- 격자 4x4 -->
          <g stroke="#2C2C2C" stroke-width="2">
            <rect x="40" y="12" width="96" height="96" rx="8" fill="#FFFFFF"/>
            <line x1="72" y1="12" x2="72" y2="108"/>
            <line x1="104" y1="12" x2="104" y2="108"/>
            <line x1="40" y1="44" x2="136" y2="44"/>
            <line x1="40" y1="76" x2="136" y2="76"/>
          </g>
          <!-- 벽 셀 -->
          <rect x="73" y="45" width="30" height="30" fill="#90A4AE" stroke="#2C2C2C" stroke-width="2"/>
          <!-- 경로 화살표 (대각선 조합) -->
          <path d="M56 28 L120 92" fill="none" stroke="#43A047" stroke-width="3" stroke-dasharray="5 5" stroke-linecap="round"/>
          <!-- 로켓 시작 -->
          <text x="56" y="36" text-anchor="middle" font-size="20">🚀</text>
          <!-- 깃발 목표 -->
          <text x="120" y="100" text-anchor="middle" font-size="20">🏁</text>
          <!-- P1 좌우 -->
          <text x="178" y="34" text-anchor="middle" font-size="11" font-weight="900" fill="#1565C0">P1 ←→</text>
          <rect x="156" y="42" width="22" height="22" rx="5" fill="#B3E5FC" stroke="#2C2C2C" stroke-width="2"/>
          <text x="167" y="58" text-anchor="middle" font-size="14" font-weight="900" fill="#2C2C2C">←</text>
          <rect x="182" y="42" width="22" height="22" rx="5" fill="#B3E5FC" stroke="#2C2C2C" stroke-width="2"/>
          <text x="193" y="58" text-anchor="middle" font-size="14" font-weight="900" fill="#2C2C2C">→</text>
          <!-- P2 상하 -->
          <text x="178" y="84" text-anchor="middle" font-size="11" font-weight="900" fill="#C62828">P2 ↑↓</text>
          <rect x="156" y="90" width="22" height="22" rx="5" fill="#FFCDD2" stroke="#2C2C2C" stroke-width="2"/>
          <text x="167" y="106" text-anchor="middle" font-size="14" font-weight="900" fill="#2C2C2C">↑</text>
          <rect x="182" y="90" width="22" height="22" rx="5" fill="#FFCDD2" stroke="#2C2C2C" stroke-width="2"/>
          <text x="193" y="106" text-anchor="middle" font-size="14" font-weight="900" fill="#2C2C2C">↓</text>
        </svg>
      </div>

      <p class="intro-text">둘이 함께 로켓을 조종해 깃발까지!</p>
      <div class="badge-2p">👥 2인 협력</div>

      <div class="intro-rules">
        <div class="rule-item">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#1565C0" stroke-width="2.5" stroke-linecap="round">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="9 8 5 12 9 16"/>
            <polyline points="15 8 19 12 15 16"/>
          </svg>
          <span>P1 = 좌우(←·⏸·→), P2 = 상하(↑·⏸·↓)</span>
        </div>
        <div class="rule-item">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#43A047" stroke-width="2.5" stroke-linecap="round">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="8 12 11 15 16 9"/>
          </svg>
          <span>둘 다 고르면 로켓이 한 칸 움직여요</span>
        </div>
        <div class="rule-item">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#EF5350" stroke-width="2.5" stroke-linecap="round">
            <path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
          <span>벽이나 밖으로 가면 실패! 60초 안에 깃발 많이!</span>
        </div>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 1-5: 카운트다운 -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">
    <header class="game-header">
      <button class="icon-btn" id="closeBtn" aria-label="홈으로">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>

      <div class="round-banner">
        <span class="round-label">시간</span>
        <span class="round-num" id="timeNum">60</span>
        <span class="round-score" id="roundScore">★ 0</span>
      </div>

      <button class="sound-toggle" id="soundToggleGame" aria-label="사운드 토글">
        <svg id="soundIconGame" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
    </header>

    <!-- 중앙 보드 + 진행 배너 -->
    <div class="board-area">
      <div class="board-maze" id="mazeBoard"></div>
      <div class="banner" id="banner"></div>
    </div>

    <!-- 양쪽 조작 존: P1 좌우 / P2 상하 -->
    <div class="zones">
      <div class="zone p1">
        <div class="zone-label">🧒 P1 좌우</div>
        <div class="zone-btns" id="p1Btns"></div>
      </div>
      <div class="zone p2">
        <div class="zone-label">🧑 P2 상하</div>
        <div class="zone-btns" id="p2Btns"></div>
      </div>
    </div>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <header class="game-header result-header">
      <div></div>
      <h2 class="result-header-title">협력 종료!</h2>
      <div></div>
    </header>

    <div class="result-body">
      <div class="result-icon-wrap" id="resultIconWrap">
        <svg viewBox="0 0 80 80" width="80" height="80" id="resultIcon">
          <rect x="28" y="62" width="24" height="6" rx="3" fill="#FFA726"/>
          <rect x="22" y="68" width="36" height="6" rx="3" fill="#FFA726"/>
          <path d="M15 18 Q15 50 40 54 Q65 50 65 18 Z" fill="#FFD54F" stroke="#FFA726" stroke-width="2"/>
          <path d="M15 18 Q8 18 8 28 Q8 40 20 42 Q15 35 15 26 Z" fill="#FFA726"/>
          <path d="M65 18 Q72 18 72 28 Q72 40 60 42 Q65 35 65 26 Z" fill="#FFA726"/>
          <ellipse cx="40" cy="20" rx="22" ry="6" fill="#FFE082"/>
          <text x="40" y="42" text-anchor="middle" font-size="16" font-weight="900" fill="#E65100">WIN</text>
        </svg>
      </div>
      <h2 class="result-title" id="resultTitle">0</h2>
      <p class="result-sub" id="resultSub">완벽한 협력이에요!</p>
    </div>

    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js?v=12"></script>
  <script src="game.js"></script>

</body>
</html>
