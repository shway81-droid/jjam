<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>색 구슬 정렬</title>
  <link rel="stylesheet" href="../../shared/style.css?v=5">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
      <h1 class="game-title">색 구슬 정렬</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔊</button>
    </header>
    <div class="intro-body">
      <div class="intro-illustration" aria-hidden="true">
        <svg viewBox="0 0 120 120" width="120" height="120">
          <rect x="4" y="4" width="112" height="112" rx="10" fill="#EDE7F6" stroke="#2C2C2C" stroke-width="3"/>
          <!-- 시험관 3개 -->
          <rect x="18" y="30" width="22" height="68" rx="11" fill="#fff" stroke="#2C2C2C" stroke-width="3"/>
          <circle cx="29" cy="88" r="8" fill="#E53935" stroke="#2C2C2C" stroke-width="2"/>
          <circle cx="29" cy="72" r="8" fill="#E53935" stroke="#2C2C2C" stroke-width="2"/>
          <circle cx="29" cy="56" r="8" fill="#1E88E5" stroke="#2C2C2C" stroke-width="2"/>
          <rect x="49" y="30" width="22" height="68" rx="11" fill="#fff" stroke="#2C2C2C" stroke-width="3"/>
          <circle cx="60" cy="88" r="8" fill="#1E88E5" stroke="#2C2C2C" stroke-width="2"/>
          <circle cx="60" cy="72" r="8" fill="#1E88E5" stroke="#2C2C2C" stroke-width="2"/>
          <circle cx="60" cy="56" r="8" fill="#E53935" stroke="#2C2C2C" stroke-width="2"/>
          <rect x="80" y="30" width="22" height="68" rx="11" fill="#fff" stroke="#2C2C2C" stroke-width="3"/>
          <path d="M84 22 L96 22 L91 34 L89 34 Z" fill="#43A047" stroke="#2C2C2C" stroke-width="2"/>
        </svg>
      </div>
      <p class="intro-text">구슬을 옮겨 시험관🧪마다<br>같은 색만 모아요!</p>
      <p class="intro-subtext">빈 시험관 또는 같은 색 위로만 옮길 수 있어요 · 4라운드</p>
      <div class="player-select-row">
        <button class="player-btn active" data-count="2">2명</button>
        <button class="player-btn" data-count="3">3명</button>
        <button class="player-btn" data-count="4">4명</button>
      </div>
    </div>
    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <section class="screen screen-game" id="gameScreen">
    <div class="top-bar" id="problemPanel">
      <div class="top-bar-meta">
        <div class="question-counter" id="questionCounter">1 / 4</div>
        <div class="problem-timer" id="problemTimer">60</div>
      </div>
      <div class="problem-status" id="problemStatus">시험관마다 같은 색만 모아요!</div>
      <button class="icon-btn close-btn" id="closeBtn" aria-label="홈으로">✕</button>
    </div>
    <div class="zones-wrap p2" id="zonesWrap"></div>
    <div class="score-bar" id="scoreBar"></div>
  </section>

  <section class="screen screen-result" id="resultScreen">
    <header class="result-header">
      <h2 class="result-title" id="resultTitle">게임 종료!</h2>
    </header>
    <div class="result-winner" id="resultWinner"></div>
    <div class="total-row" id="totalRow"></div>
    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js?v=12"></script>
  <script src="game.js"></script>
</body>
</html>
