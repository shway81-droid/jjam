<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>백판 빈칸</title>
  <link rel="stylesheet" href="../../shared/style.css?v=5">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
      <h1 class="game-title">백판 빈칸</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔊</button>
    </header>

    <div class="intro-body">
      <div class="intro-illust">
        <svg viewBox="0 0 220 120" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="4" width="212" height="112" rx="16" fill="#FFF8E1" stroke="#2C2C2C" stroke-width="3"/>
          <!-- 3x3 number grid -->
          <rect x="20" y="20" width="180" height="80" rx="10" fill="#E8EAF6" stroke="#2C2C2C" stroke-width="2"/>
          <!-- row 1 -->
          <rect x="26" y="26" width="50" height="30" rx="6" fill="#fff" stroke="#5C6BC0" stroke-width="1.5"/>
          <text x="51" y="46" text-anchor="middle" font-size="14" font-weight="800" fill="#2C2C2C">23</text>
          <rect x="84" y="26" width="50" height="30" rx="6" fill="#fff" stroke="#5C6BC0" stroke-width="1.5"/>
          <text x="109" y="46" text-anchor="middle" font-size="14" font-weight="800" fill="#2C2C2C">24</text>
          <rect x="142" y="26" width="50" height="30" rx="6" fill="#fff" stroke="#5C6BC0" stroke-width="1.5"/>
          <text x="167" y="46" text-anchor="middle" font-size="14" font-weight="800" fill="#2C2C2C">25</text>
          <!-- row 2 -->
          <rect x="26" y="62" width="50" height="30" rx="6" fill="#fff" stroke="#5C6BC0" stroke-width="1.5"/>
          <text x="51" y="82" text-anchor="middle" font-size="14" font-weight="800" fill="#2C2C2C">33</text>
          <rect x="84" y="62" width="50" height="30" rx="6" fill="#FFE082" stroke="#F57F17" stroke-width="2"/>
          <text x="109" y="82" text-anchor="middle" font-size="16" font-weight="900" fill="#E65100">?</text>
          <rect x="142" y="62" width="50" height="30" rx="6" fill="#fff" stroke="#5C6BC0" stroke-width="1.5"/>
          <text x="167" y="82" text-anchor="middle" font-size="14" font-weight="800" fill="#2C2C2C">35</text>
        </svg>
      </div>
      <p class="intro-text">💯 수 배열표의<br>빈칸에 들어갈 수를 맞혀요!</p>
      <p class="intro-subtext">오답은 라운드 실격 · 8라운드 승부</p>

      <div class="select-label">인원 선택</div>
      <div class="player-select-row">
        <button class="player-btn active" data-count="2">2명</button>
        <button class="player-btn" data-count="3">3명</button>
        <button class="player-btn" data-count="4">4명</button>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 1-5: 카운트다운 -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">
    <div class="top-bar" id="problemPanel">
      <div class="top-bar-meta">
        <div class="question-counter" id="questionCounter">1 / 8</div>
        <div class="problem-timer" id="problemTimer">12</div>
      </div>
      <div class="chart-problem-body">
        <div class="chart-grid" id="chartGrid"></div>
        <div class="problem-status" id="problemStatus"></div>
      </div>
      <button class="icon-btn close-btn" id="closeBtn" aria-label="홈으로">✕</button>
    </div>

    <div class="zones-wrap" id="zonesWrap"></div>
    <div class="score-bar" id="scoreBar"></div>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <header class="result-header">
      <h2 class="result-title" id="resultTitle">게임 종료!</h2>
    </header>
    <div class="result-winner" id="resultWinner"></div>

    <div class="result-table-wrap">
      <table class="result-table" id="resultTable">
        <thead id="resultTableHead"></thead>
        <tbody id="resultTableBody"></tbody>
      </table>
    </div>

    <div class="total-row" id="totalRow"></div>

    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js?v=11"></script>
  <script src="game.js"></script>
</body>
</html>
