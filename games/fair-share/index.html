<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>공평하게 나누기</title>
  <link rel="stylesheet" href="../../shared/style.css?v=5">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <h1 class="game-title">공평하게 나누기</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔊</button>
    </header>

    <div class="intro-body">
      <div class="intro-illust" aria-hidden="true">
        <svg viewBox="0 0 260 120" width="260" height="120">
          <!-- 컨베이어 -->
          <rect x="80" y="50" width="100" height="30" rx="8" fill="#BCAAA4" stroke="#2C2C2C" stroke-width="3"/>
          <text x="130" y="72" text-anchor="middle" font-size="18">📦</text>
          <!-- P1 트럭 -->
          <rect x="8" y="44" width="66" height="38" rx="8" fill="#B3E5FC" stroke="#2C2C2C" stroke-width="3"/>
          <text x="41" y="70" text-anchor="middle" font-size="22">🚚</text>
          <text x="41" y="38" text-anchor="middle" font-size="9" font-weight="800" fill="#1565C0">P1 합계: 12</text>
          <!-- P2 트럭 -->
          <rect x="186" y="44" width="66" height="38" rx="8" fill="#FFCDD2" stroke="#2C2C2C" stroke-width="3"/>
          <text x="219" y="70" text-anchor="middle" font-size="22">🚚</text>
          <text x="219" y="38" text-anchor="middle" font-size="9" font-weight="800" fill="#C62828">P2 합계: 12</text>
          <!-- 저울 -->
          <text x="130" y="110" text-anchor="middle" font-size="26">⚖️</text>
        </svg>
      </div>
      <p class="intro-text">상자를 탭해서 트럭에 나눠요!<br>두 트럭 무게를 똑같이!</p>
      <div class="badge-2p">👥 2명 전용</div>
      <div class="intro-rules">
        <div class="rule-item">📦 상자를 탭하면 P1→P2→컨베이어 순환</div>
        <div class="rule-item">⚖️ 두 합이 같으면 자동 성공!</div>
        <div class="rule-item">⏰ 40초 안에 완성하세요</div>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 1-5: 카운트다운 -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">
    <div class="top-bar" id="topBar">
      <div class="top-bar-meta">
        <div class="question-counter" id="questionCounter">1 / 8</div>
        <div class="problem-timer" id="problemTimer">40</div>
      </div>
      <div class="conveyor-label">컨베이어</div>
      <button class="icon-btn close-btn" id="closeBtn" aria-label="홈으로">✕</button>
    </div>

    <div class="zones-wrap p2" id="zonesWrap"></div>
    <div class="score-bar" id="scoreBar"></div>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <header class="result-header">
      <h2 class="result-title" id="resultTitle">게임 종료!</h2>
    </header>
    <div class="result-winner" id="resultWinner"></div>

    <div class="result-table-wrap">
      <table class="result-table" id="resultTable">
        <thead id="resultTableHead"></thead>
        <tbody id="resultTableBody"></tbody>
      </table>
    </div>

    <div class="total-row" id="totalRow"></div>

    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js?v=8"></script>
  <script src="game.js"></script>
</body>
</html>
