<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>자로 재기</title>
  <link rel="stylesheet" href="../../shared/style.css?v=5">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 / 인원 선택 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <h1 class="game-title">자로 재기</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">
        <svg id="soundIconIntro" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>
    </header>

    <div class="intro-body">
      <!-- Decorative ruler preview -->
      <div class="intro-stage-wrap">
        <svg viewBox="0 0 240 120" width="240" height="120" class="intro-stage-svg">
          <!-- Pencil bar (from 0 to 7cm) -->
          <rect x="20" y="30" width="140" height="22" rx="6" fill="#EF9A9A" stroke="#C62828" stroke-width="2.5"/>
          <rect x="20" y="30" width="20" height="22" rx="6" fill="#FFCC80" stroke="#C62828" stroke-width="2.5"/>
          <!-- Ruler body -->
          <rect x="10" y="66" width="220" height="40" rx="5" fill="#FFF3C4" stroke="#37474F" stroke-width="3"/>
          <!-- Ticks + numbers -->
          <g stroke="#37474F" stroke-width="2" stroke-linecap="round">
            <line x1="20" y1="66" x2="20" y2="84"/>
            <line x1="40" y1="66" x2="40" y2="78"/>
            <line x1="60" y1="66" x2="60" y2="78"/>
            <line x1="80" y1="66" x2="80" y2="78"/>
            <line x1="100" y1="66" x2="100" y2="78"/>
            <line x1="120" y1="66" x2="120" y2="84"/>
            <line x1="140" y1="66" x2="140" y2="78"/>
            <line x1="160" y1="66" x2="160" y2="78"/>
            <line x1="180" y1="66" x2="180" y2="78"/>
            <line x1="200" y1="66" x2="200" y2="78"/>
            <line x1="220" y1="66" x2="220" y2="84"/>
          </g>
          <g font-size="10" font-weight="bold" fill="#37474F" text-anchor="middle" font-family="sans-serif">
            <text x="20" y="99">0</text>
            <text x="120" y="99">5</text>
            <text x="220" y="99">10</text>
          </g>
        </svg>
      </div>

      <p class="intro-text">자를 보고<br>막대의 길이를 맞혀요!</p>
      <p class="intro-subtext">먼저 맞히면 +1점 · 틀리면 라운드 실격 -1점 감점!</p>
      <p class="intro-subtext">10라운드 승부 · 뒤로 갈수록 어려워져요</p>

      <div class="player-select-label">인원 선택</div>
      <div class="player-select-row">
        <button class="player-btn active" data-count="2">2명</button>
        <button class="player-btn" data-count="3">3명</button>
        <button class="player-btn" data-count="4">4명</button>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 1-5: 카운트다운 -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">
    <!-- 플레이어 구역 (JS로 동적 렌더링) -->
    <div class="zones-wrap" id="zonesWrap"></div>

    <!-- 중앙 문제 패널 -->
    <div class="stage-panel" id="stagePanel">
      <div class="round-badge" id="roundBadge">1 / 10</div>
      <div class="stage-view" id="stageView">
        <!-- SVG ruler injected by JS -->
      </div>
      <div class="stage-feedback" id="stageFeedback"></div>
    </div>

    <!-- 홈 버튼 -->
    <button class="icon-btn close-btn" id="closeBtn" aria-label="홈으로">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <header class="result-header">
      <h2 class="result-title" id="resultTitle">게임 종료!</h2>
    </header>
    <div class="result-winner" id="resultWinner"></div>

    <div class="result-table-wrap">
      <table class="result-table" id="resultTable">
        <thead id="resultTableHead"></thead>
        <tbody id="resultTableBody"></tbody>
      </table>
    </div>

    <div class="total-row" id="totalRow"></div>

    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js?v=12"></script>
  <script src="game.js"></script>
</body>
</html>
