<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>도미노 채우기</title>
  <link rel="stylesheet" href="../../shared/style.css?v=5">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
      <h1 class="game-title">도미노 채우기</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔊</button>
    </header>

    <div class="intro-body">
      <div class="intro-illustration" aria-hidden="true">
        <svg viewBox="0 0 140 110" width="140" height="110">
          <!-- 판 테두리 (4×4) -->
          <rect x="14" y="14" width="78" height="78" rx="8" fill="#FFF8F0" stroke="#2C2C2C" stroke-width="3"/>
          <!-- 놓인 1×2 도미노들 (셀 18px) -->
          <rect x="16" y="16" width="36" height="18" rx="3" fill="#90CAF9" stroke="#2C2C2C" stroke-width="2.5"/>
          <rect x="54" y="16" width="18" height="36" rx="3" fill="#A5D6A7" stroke="#2C2C2C" stroke-width="2.5"/>
          <rect x="74" y="16" width="18" height="36" rx="3" fill="#FFCC80" stroke="#2C2C2C" stroke-width="2.5"/>
          <rect x="16" y="36" width="18" height="36" rx="3" fill="#CE93D8" stroke="#2C2C2C" stroke-width="2.5"/>
          <rect x="36" y="36" width="18" height="36" rx="3" fill="#80DEEA" stroke="#2C2C2C" stroke-width="2.5"/>
          <rect x="16" y="74" width="36" height="18" rx="3" fill="#F48FB1" stroke="#2C2C2C" stroke-width="2.5"/>
          <!-- 빈 칸 두 개 (점선) + 들고 있는 도미노 -->
          <rect x="54" y="56" width="36" height="18" rx="3" fill="#FCEFD8" stroke="#C7B59A" stroke-width="2.5" stroke-dasharray="4 3"/>
          <g transform="translate(104 78)">
            <rect x="0" y="0" width="36" height="18" rx="3" fill="#EF9A9A" stroke="#2C2C2C" stroke-width="2.5"/>
          </g>
          <text x="98" y="70" text-anchor="middle" font-size="18" font-weight="900" fill="#5E35B1">➜</text>
        </svg>
      </div>
      <p class="intro-text">빈 칸 두 개를 골라<br>1×2 도미노로 빈틈없이 채워요!</p>
      <p class="intro-subtext">모든 칸을 도미노로 덮으면 완성 · 먼저 채운 사람 승! · 3라운드</p>

      <div class="select-label">인원 선택</div>
      <div class="player-select-row">
        <button class="player-btn active" data-count="2">2명</button>
        <button class="player-btn" data-count="3">3명</button>
        <button class="player-btn" data-count="4">4명</button>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 1-5: 카운트다운 -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">

    <div class="top-bar" id="problemPanel">
      <div class="top-bar-meta">
        <div class="question-counter" id="questionCounter">1 / 3</div>
        <div class="problem-timer" id="problemTimer">60</div>
      </div>
      <div class="problem-status" id="problemStatus">빈 칸 두 개를 골라 도미노를 놓으세요!</div>
      <button class="icon-btn close-btn" id="closeBtn" aria-label="홈으로">✕</button>
    </div>

    <div class="zones-wrap" id="zonesWrap"></div>
    <div class="score-bar" id="scoreBar"></div>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <header class="result-header">
      <h2 class="result-title" id="resultTitle">게임 종료!</h2>
    </header>
    <div class="result-winner" id="resultWinner"></div>

    <div class="total-row" id="totalRow"></div>

    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js?v=12"></script>
  <script src="game.js"></script>
</body>
</html>
