<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>숫자 점프</title>
  <link rel="stylesheet" href="../../shared/style.css?v=5">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 화면 1: 인트로 -->
  <section class="screen screen-intro active" id="introScreen">
    <header class="game-header">
      <button class="icon-btn" id="backBtn" aria-label="뒤로가기">←</button>
      <h1 class="game-title">숫자 점프</h1>
      <button class="sound-toggle" id="soundToggleIntro" aria-label="사운드 토글">🔊</button>
    </header>

    <div class="intro-body">
      <div class="intro-illustration" aria-hidden="true">
        <svg viewBox="0 0 160 90" width="160" height="90">
          <!-- 발판들 (한 줄) -->
          <g>
            <rect x="8"   y="48" width="26" height="26" rx="6" fill="#FFF8F0" stroke="#2C2C2C" stroke-width="3"/>
            <rect x="40"  y="48" width="26" height="26" rx="6" fill="#A5D6A7" stroke="#2C2C2C" stroke-width="3"/>
            <rect x="72"  y="48" width="26" height="26" rx="6" fill="#90CAF9" stroke="#2C2C2C" stroke-width="3"/>
            <rect x="104" y="48" width="26" height="26" rx="6" fill="#CE93D8" stroke="#2C2C2C" stroke-width="3"/>
            <rect x="136" y="48" width="20" height="26" rx="6" fill="#FFCC80" stroke="#2C2C2C" stroke-width="3"/>
          </g>
          <!-- 발판 숫자 -->
          <text x="21"  y="67" text-anchor="middle" font-size="15" font-weight="900" fill="#2C2C2C">2</text>
          <text x="53"  y="67" text-anchor="middle" font-size="15" font-weight="900" fill="#2C2C2C">1</text>
          <text x="85"  y="67" text-anchor="middle" font-size="15" font-weight="900" fill="#2C2C2C">2</text>
          <text x="117" y="67" text-anchor="middle" font-size="15" font-weight="900" fill="#2C2C2C">1</text>
          <!-- 깃발 (도착) -->
          <text x="146" y="67" text-anchor="middle" font-size="16">🚩</text>
          <!-- 점프 호 -->
          <path d="M21 42 Q37 14 85 38" fill="none" stroke="#FF7043" stroke-width="3" stroke-dasharray="3 4" stroke-linecap="round"/>
          <!-- 캥거루 -->
          <text x="21" y="40" text-anchor="middle" font-size="22">🦘</text>
        </svg>
      </div>
      <p class="intro-text">발판에 적힌 수만큼<br>폴짝 점프!</p>
      <p class="intro-subtext">정확히 점프해서 깃발 도착 · 막히면 출발 칸으로 · 먼저 도착하면 승! · 3라운드</p>

      <div class="select-label">인원 선택</div>
      <div class="player-select-row">
        <button class="player-btn active" data-count="2">2명</button>
        <button class="player-btn" data-count="3">3명</button>
        <button class="player-btn" data-count="4">4명</button>
      </div>
    </div>

    <button class="btn btn-primary btn-play" id="playBtn">PLAY</button>
  </section>

  <!-- 화면 1-5: 카운트다운 -->
  <section class="screen screen-countdown" id="countdownScreen">
    <div class="countdown-number" id="countdownNumber">3</div>
  </section>

  <!-- 화면 2: 게임 플레이 -->
  <section class="screen screen-game" id="gameScreen">

    <div class="top-bar" id="problemPanel">
      <div class="top-bar-meta">
        <div class="question-counter" id="questionCounter">1 / 3</div>
        <div class="problem-timer" id="problemTimer">60</div>
      </div>
      <div class="problem-status" id="problemStatus">발판의 수만큼 점프해서 깃발까지!</div>
      <button class="icon-btn close-btn" id="closeBtn" aria-label="홈으로">✕</button>
    </div>

    <div class="zones-wrap" id="zonesWrap"></div>
    <div class="score-bar" id="scoreBar"></div>
  </section>

  <!-- 화면 3: 결과 -->
  <section class="screen screen-result" id="resultScreen">
    <header class="result-header">
      <h2 class="result-title" id="resultTitle">게임 종료!</h2>
    </header>
    <div class="result-winner" id="resultWinner"></div>

    <div class="total-row" id="totalRow"></div>

    <div class="result-actions">
      <button class="btn btn-primary" id="retryBtn">다시하기</button>
      <button class="btn btn-secondary" id="homeBtn">홈으로</button>
    </div>
  </section>

  <script src="../../shared/engine.js?v=12"></script>
  <script src="game.js"></script>
</body>
</html>
