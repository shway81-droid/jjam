<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1600" font-family="'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic','맑은 고딕','Segoe UI','Apple Color Emoji','Segoe UI Emoji',sans-serif">
  <!-- 배경 -->
  <rect x="0" y="0" width="1000" height="1600" fill="#FFF8E1"/>
  <rect x="8" y="8" width="984" height="1584" rx="28" fill="none" stroke="#2B2B2B" stroke-width="6"/>

  <!-- ===== 헤더 ===== -->
  <rect x="38" y="42" width="924" height="158" rx="20" fill="#1B5E3F"/>
  <rect x="30" y="34" width="924" height="158" rx="20" fill="#2E7D52" stroke="#2B2B2B" stroke-width="5"/>
  <text x="492" y="104" text-anchor="middle" font-size="52" font-weight="800" fill="#FFFFFF">🎮 짬짬이 교실</text>
  <text x="492" y="158" text-anchor="middle" font-size="29" font-weight="600" fill="#FFE082">원작과 무엇이 달라졌나요?</text>

  <!-- ===== 히어로: 60 → 100 ===== -->
  <!-- 원작 -->
  <rect x="95" y="240" width="250" height="150" rx="18" fill="#ECECEC" stroke="#2B2B2B" stroke-width="4"/>
  <text x="220" y="288" text-anchor="middle" font-size="26" font-weight="700" fill="#7A7A7A">원작</text>
  <text x="220" y="360" text-anchor="middle" font-size="78" font-weight="800" fill="#9E9E9E">60<tspan font-size="34" font-weight="700">종</tspan></text>
  <!-- 화살표 -->
  <text x="500" y="345" text-anchor="middle" font-size="86" font-weight="800" fill="#FFA000">➜</text>
  <!-- 새 버전 -->
  <rect x="663" y="248" width="250" height="150" rx="18" fill="#FFB300"/>
  <rect x="655" y="240" width="250" height="150" rx="18" fill="#FFC83D" stroke="#2B2B2B" stroke-width="4"/>
  <text x="780" y="288" text-anchor="middle" font-size="26" font-weight="800" fill="#5D4037">지금</text>
  <text x="780" y="362" text-anchor="middle" font-size="86" font-weight="800" fill="#2B2B2B">100<tspan font-size="34" font-weight="700">종</tspan></text>
  <text x="500" y="432" text-anchor="middle" font-size="27" font-weight="600" fill="#4E342E">중복 게임은 정리하고 새 게임을 대거 추가했어요</text>

  <!-- ===== 비교 표 ===== -->
  <rect x="40" y="470" width="920" height="624" rx="20" fill="#FFFCF0" stroke="#2B2B2B" stroke-width="5"/>
  <!-- 컬럼 헤더 -->
  <text x="668" y="516" text-anchor="middle" font-size="28" font-weight="800" fill="#9E9E9E">원작</text>
  <text x="858" y="516" text-anchor="middle" font-size="28" font-weight="800" fill="#E68900">지금</text>
  <line x1="60" y1="534" x2="940" y2="534" stroke="#E0D5B8" stroke-width="2"/>

  <!-- 행 그룹: 각 행 height 68, 첫 중심 y=576 -->
  <!-- 1 학생 뽑기 -->
  <text x="80" y="586" font-size="30" font-weight="700" fill="#2B2B2B">🙋 학생 뽑기</text>
  <text x="640" y="585" font-size="33" font-weight="800" fill="#C0C0C0">✕</text>
  <circle cx="858" cy="576" r="19" fill="#43A047"/><path d="M849 576 l6 7 l12 -14" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="60" y1="610" x2="940" y2="610" stroke="#F0E8D0" stroke-width="2"/>
  <!-- 2 즐겨찾기 -->
  <text x="80" y="654" font-size="30" font-weight="700" fill="#2B2B2B">⭐ 즐겨찾기</text>
  <text x="640" y="653" font-size="33" font-weight="800" fill="#C0C0C0">✕</text>
  <circle cx="858" cy="644" r="19" fill="#43A047"/><path d="M849 644 l6 7 l12 -14" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="60" y1="678" x2="940" y2="678" stroke="#F0E8D0" stroke-width="2"/>
  <!-- 3 게임 룰렛 -->
  <text x="80" y="722" font-size="30" font-weight="700" fill="#2B2B2B">🎲 게임 룰렛</text>
  <text x="640" y="721" font-size="33" font-weight="800" fill="#C0C0C0">✕</text>
  <circle cx="858" cy="712" r="19" fill="#43A047"/><path d="M849 712 l6 7 l12 -14" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="60" y1="746" x2="940" y2="746" stroke="#F0E8D0" stroke-width="2"/>
  <!-- 4 첫 화면 배경음악 -->
  <text x="80" y="790" font-size="30" font-weight="700" fill="#2B2B2B">🎵 첫 화면 배경음악</text>
  <text x="640" y="789" font-size="33" font-weight="800" fill="#C0C0C0">✕</text>
  <circle cx="858" cy="780" r="19" fill="#43A047"/><path d="M849 780 l6 7 l12 -14" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="60" y1="814" x2="940" y2="814" stroke="#F0E8D0" stroke-width="2"/>
  <!-- 5 전체화면 -->
  <text x="80" y="858" font-size="30" font-weight="700" fill="#2B2B2B">⛶ 전체화면 버튼</text>
  <text x="640" y="857" font-size="33" font-weight="800" fill="#C0C0C0">✕</text>
  <circle cx="858" cy="848" r="19" fill="#43A047"/><path d="M849 848 l6 7 l12 -14" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="60" y1="882" x2="940" y2="882" stroke="#F0E8D0" stroke-width="2"/>
  <!-- 6 소리 기본값 -->
  <text x="80" y="926" font-size="30" font-weight="700" fill="#2B2B2B">🔊 소리 기본값</text>
  <text x="668" y="925" text-anchor="middle" font-size="25" font-weight="700" fill="#9E9E9E">음소거</text>
  <text x="858" y="925" text-anchor="middle" font-size="26" font-weight="800" fill="#E68900">켜짐</text>
  <line x1="60" y1="950" x2="940" y2="950" stroke="#F0E8D0" stroke-width="2"/>
  <!-- 7 학년 구분 -->
  <text x="80" y="994" font-size="30" font-weight="700" fill="#2B2B2B">🎓 학년 구분 표시</text>
  <text x="668" y="993" text-anchor="middle" font-size="25" font-weight="700" fill="#9E9E9E">있음</text>
  <text x="858" y="993" text-anchor="middle" font-size="26" font-weight="800" fill="#E68900">없앰·단순화</text>
  <line x1="60" y1="1018" x2="940" y2="1018" stroke="#F0E8D0" stroke-width="2"/>
  <!-- 8 첫 로딩 -->
  <text x="80" y="1062" font-size="30" font-weight="700" fill="#2B2B2B">⚡ 첫 화면 로딩</text>
  <text x="668" y="1061" text-anchor="middle" font-size="25" font-weight="700" fill="#9E9E9E">느림</text>
  <text x="858" y="1061" text-anchor="middle" font-size="26" font-weight="800" fill="#E68900">빠름</text>

  <!-- ===== 카테고리 분포 ===== -->
  <text x="500" y="1158" text-anchor="middle" font-size="30" font-weight="800" fill="#2B2B2B">게임 100종 · 6가지 분야</text>
  <!-- 칩 6개 (2행3열) -->
  <!-- 행1 -->
  <g>
    <rect x="52" y="1180" width="290" height="86" rx="16" fill="#FFFFFF" stroke="#2B2B2B" stroke-width="3"/>
    <circle cx="100" cy="1223" r="20" fill="#FF7043"/>
    <text x="138" y="1216" font-size="25" font-weight="700" fill="#2B2B2B">반응속도</text>
    <text x="320" y="1233" text-anchor="end" font-size="40" font-weight="800" fill="#FF7043">17</text>
  </g>
  <g>
    <rect x="355" y="1180" width="290" height="86" rx="16" fill="#FFFFFF" stroke="#2B2B2B" stroke-width="3"/>
    <circle cx="403" cy="1223" r="20" fill="#7E57C2"/>
    <text x="441" y="1216" font-size="25" font-weight="700" fill="#2B2B2B">두뇌</text>
    <text x="623" y="1233" text-anchor="end" font-size="40" font-weight="800" fill="#7E57C2">17</text>
  </g>
  <g>
    <rect x="658" y="1180" width="290" height="86" rx="16" fill="#FFFFFF" stroke="#2B2B2B" stroke-width="3"/>
    <circle cx="706" cy="1223" r="20" fill="#26A69A"/>
    <text x="744" y="1216" font-size="25" font-weight="700" fill="#2B2B2B">수학</text>
    <text x="926" y="1233" text-anchor="end" font-size="40" font-weight="800" fill="#26A69A">18</text>
  </g>
  <!-- 행2 -->
  <g>
    <rect x="52" y="1278" width="290" height="86" rx="16" fill="#FFFFFF" stroke="#2B2B2B" stroke-width="3"/>
    <circle cx="100" cy="1321" r="20" fill="#42A5F5"/>
    <text x="138" y="1314" font-size="25" font-weight="700" fill="#2B2B2B">지식</text>
    <text x="320" y="1331" text-anchor="end" font-size="40" font-weight="800" fill="#42A5F5">18</text>
  </g>
  <g>
    <rect x="355" y="1278" width="290" height="86" rx="16" fill="#FFFFFF" stroke="#2B2B2B" stroke-width="3"/>
    <circle cx="403" cy="1321" r="20" fill="#66BB6A"/>
    <text x="441" y="1314" font-size="25" font-weight="700" fill="#2B2B2B">협력</text>
    <text x="623" y="1331" text-anchor="end" font-size="40" font-weight="800" fill="#66BB6A">15</text>
  </g>
  <g>
    <rect x="658" y="1278" width="290" height="86" rx="16" fill="#FFFFFF" stroke="#2B2B2B" stroke-width="3"/>
    <circle cx="706" cy="1321" r="20" fill="#EC407A"/>
    <text x="744" y="1314" font-size="25" font-weight="700" fill="#2B2B2B">퍼즐</text>
    <text x="926" y="1331" text-anchor="end" font-size="40" font-weight="800" fill="#EC407A">15</text>
  </g>

  <!-- ===== 푸터 ===== -->
  <rect x="300" y="1410" width="400" height="74" rx="37" fill="#FFB300"/>
  <rect x="294" y="1404" width="400" height="74" rx="37" fill="#FFC83D" stroke="#2B2B2B" stroke-width="4"/>
  <text x="494" y="1452" text-anchor="middle" font-size="32" font-weight="800" fill="#2B2B2B">▶ 지금 해보기</text>
  <text x="500" y="1524" text-anchor="middle" font-size="27" font-weight="700" fill="#2E7D52">shway81-droid.github.io/jjam</text>
  <text x="500" y="1560" text-anchor="middle" font-size="20" font-weight="500" fill="#7A6A55">설치·로그인 없이 브라우저에서 바로 · 오프라인에서도 동작</text>
</svg>
